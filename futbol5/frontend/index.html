<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fútbol 5 — Armador de Equipos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --green: #22c55e;
    --green2: #16a34a;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f1f5f9;
    --muted: #64748b;
    --muted2: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -20%, rgba(34,197,94,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
  }

  /* LAYOUT */
  #app { max-width: 1100px; margin: 0 auto; padding: 0 16px 60px; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 24px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 44px; height: 44px; background: var(--green); border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    box-shadow: 0 0 24px rgba(34,197,94,0.4);
  }
  .logo h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.9rem; font-weight: 900; letter-spacing: 0.5px; line-height: 1; }
  .logo h1 span { color: var(--green); }
  .logo p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

  /* SESSION */
  .session-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .session-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--card-border);
    border-radius: 50px; padding: 6px 14px; font-size: 0.82rem;
  }
  .session-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* TABS */
  nav.tabs {
    display: flex; gap: 4px; margin-bottom: 24px;
    background: var(--bg2); border: 1px solid var(--card-border);
    padding: 4px; border-radius: 14px; width: fit-content;
  }
  nav.tabs button {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.5px;
    padding: 8px 20px; border-radius: 10px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    transition: all .18s;
  }
  nav.tabs button.active { background: var(--green); color: #000; }
  nav.tabs button:hover:not(.active) { color: var(--text); }

  /* CARDS */
  .card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--green); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* GRID */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:700px) { .grid2 { grid-template-columns: 1fr; } }
  .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  @media(max-width:600px) { .grid3 { grid-template-columns: 1fr 1fr; } }

  /* BUTTONS */
  .btn {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 1rem; letter-spacing: 0.5px; text-transform: uppercase;
    padding: 10px 22px; border-radius: 10px; border: none; cursor: pointer;
    transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-green { background: var(--green); color: #000; }
  .btn-green:hover { background: var(--green2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
  .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--card-border); }
  .btn-ghost:hover { border-color: var(--green); color: var(--green); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-red:hover { background: rgba(239,68,68,0.25); }
  .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* INPUTS */
  input[type=text], input[type=number], select, textarea {
    background: var(--bg2); border: 1px solid var(--card-border);
    color: var(--text); padding: 9px 12px; border-radius: 8px;
    font-family: 'Barlow', sans-serif; font-size: 0.9rem;
    outline: none; transition: border .15s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--green); }
  label { font-size: 0.8rem; color: var(--muted2); display: block; margin-bottom: 4px; }
  .field { margin-bottom: 12px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  /* RANGE SLIDER — single (regularidad) */
  .range-wrap { display: flex; align-items: center; gap: 10px; }
  input[type=range] {
    -webkit-appearance: none; flex: 1; height: 4px;
    background: var(--bg3); border-radius: 4px; border: none; padding: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; background: var(--green);
    border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(34,197,94,0.5);
  }
  /* RANGE SLIDER — doble (atributos min–max) */
  .range-double { position: relative; height: 28px; }
  .range-double .rd-track {
    position: absolute; width: 100%; height: 4px;
    top: 50%; transform: translateY(-50%);
    background: var(--bg3); border-radius: 4px;
  }
  .range-double .rd-fill {
    position: absolute; height: 4px;
    background: var(--green); border-radius: 4px;
    top: 0;
  }
  .range-double input[type=range] {
    position: absolute; width: 100%; height: 4px;
    top: 50%; transform: translateY(-50%);
    background: transparent !important; pointer-events: none;
    -webkit-appearance: none; border: none; padding: 0; flex: none;
  }
  .range-double input[type=range]::-webkit-slider-thumb {
    pointer-events: all; -webkit-appearance: none;
    width: 18px; height: 18px; background: var(--green);
    border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(34,197,94,0.5);
  }

  /* PLAYER CARDS */
  .player-chip {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg3); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 8px 12px; gap: 8px;
    transition: border .15s;
  }
  .player-chip:hover { border-color: rgba(255,255,255,0.18); }
  .player-chip.selected { border-color: var(--green); background: rgba(34,197,94,0.08); }
  .player-chip.gk { border-left: 3px solid var(--yellow); }
  .player-name { font-weight: 600; font-size: 0.95rem; }
  .player-ovr {
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700;
    color: var(--green); min-width: 36px; text-align: right;
  }
  .badge {
    font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-gk { background: rgba(234,179,8,0.2); color: var(--yellow); }
  .badge-up { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-down { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-flat { background: rgba(100,116,139,0.2); color: var(--muted2); }

  /* TEAM DISPLAY */
  .team-box {
    background: var(--bg2); border: 1px solid var(--card-border);
    border-radius: 12px; overflow: hidden;
  }
  .team-header {
    padding: 10px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .team-header.a { background: rgba(59,130,246,0.15); border-bottom: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
  .team-header.b { background: rgba(239,68,68,0.12); border-bottom: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
  .team-header .score-big {
    font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900;
  }
  .team-list { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .team-player { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; font-size: 0.9rem; }
  .team-player:hover { background: rgba(255,255,255,0.04); }
  .rank-num { width: 20px; font-size: 0.75rem; color: var(--muted); }

  /* STATS BAR */
  .stat-bar { margin-bottom: 10px; }
  .stat-bar-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted2); margin-bottom: 3px; }
  .stat-bar-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; }

  /* MATCH CARD */
  .match-card {
    background: var(--bg3); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  }
  .match-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem; font-weight: 900; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .match-score .divider { color: var(--muted); font-size: 1.5rem; }

  /* SYNERGY SELECTOR */
  .syn-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--card-border); }
  .syn-row:last-child { border: none; }
  .syn-sel { display: flex; gap: 4px; }
  .syn-btn {
    width: 32px; height: 28px; border-radius: 6px; border: 1px solid var(--card-border);
    background: var(--bg2); cursor: pointer; font-size: 0.8rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; transition: all .12s;
    color: var(--muted2);
  }
  .syn-btn.active-p2 { background: rgba(34,197,94,0.3); border-color: var(--green); color: var(--green); }
  .syn-btn.active-p1 { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
  .syn-btn.active-0  { background: var(--bg3); border-color: var(--muted); color: var(--muted2); }
  .syn-btn.active-m1 { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
  .syn-btn.active-m2 { background: rgba(239,68,68,0.3); border-color: var(--red); color: var(--red); }

  /* WINNER BUTTONS */
  .winner-btn { flex:1; padding:10px 6px; border-radius:10px; border:1px solid var(--card-border); background:var(--bg3); color:var(--muted); cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:700; transition:all .15s; }
  .winner-btn.active-a { background:rgba(59,130,246,.2); border-color:var(--blue); color:#93c5fd; }
  .winner-btn.active-d { background:rgba(234,179,8,.15); border-color:var(--yellow); color:var(--yellow); }
  .winner-btn.active-b { background:rgba(239,68,68,.2); border-color:var(--red); color:#fca5a5; }

  /* RANK DRAG LIST */
  .rank-drop-zone { min-height:48px; border:1px dashed var(--card-border); border-radius:10px; padding:6px; transition:border-color .15s; }
  .rank-drop-zone.drag-over { border-color:var(--green); background:rgba(34,197,94,.05); }
  .rank-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg3); border:1px solid var(--card-border); border-radius:8px; margin-bottom:4px; cursor:grab; user-select:none; transition:opacity .15s; }
  .rank-item:last-child { margin-bottom:0; }
  .rank-item.dragging { opacity:.35; }
  .rank-bench { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .rank-bench-chip { padding:5px 12px; background:var(--bg2); border:1px solid var(--card-border); border-radius:20px; color:var(--muted2); font-size:.85rem; cursor:pointer; transition:all .12s; }
  .rank-bench-chip:hover { border-color:var(--green); color:var(--green); }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 16px;
    backdrop-filter: blur(4px);
    animation: fadeIn .15s;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 28px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
    animation: slideUp .2s;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 900;
    margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
  }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; line-height: 1; }
  .close-btn:hover { color: var(--text); }

  /* ADMIN PANEL LINK */
  .admin-link {
    font-size: 0.78rem; color: var(--muted); padding: 5px 10px;
    border: 1px solid var(--card-border); border-radius: 6px; cursor: pointer;
    background: none; transition: all .15s; font-family: 'Barlow', sans-serif;
  }
  .admin-link:hover { border-color: var(--yellow); color: var(--yellow); }

  /* TOAST */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 18px; border-radius: 10px; font-size: 0.88rem; font-weight: 500;
    animation: slideIn .2s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-width: 300px;
  }
  .toast.ok { background: rgba(34,197,94,0.15); border: 1px solid var(--green); color: #86efac; }
  .toast.err { background: rgba(239,68,68,0.15); border: 1px solid var(--red); color: #fca5a5; }

  /* LOADER */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(34,197,94,0.3); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px; color: var(--muted); }
  .empty p { margin-top: 8px; font-size: 0.88rem; }

  /* SECTION HEADER */
  .sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .divider-line { height: 1px; background: var(--card-border); margin: 16px 0; }

  /* LOGIN */
  .login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 300px; text-align: center; gap: 20px;
  }
  .login-screen h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; }
  .login-screen p { color: var(--muted2); font-size: 0.9rem; }

  /* ATTRIBUTE TABLE */
  .attr-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 10px; }
  @media(max-width:500px) { .attr-grid { grid-template-columns: 1fr 1fr; } }
  .attr-cell {
    background: var(--bg3); border-radius: 8px; padding: 8px 10px; text-align: center;
    border: 1px solid var(--card-border);
  }
  .attr-cell .val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--green); }
  .attr-cell .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; margin-top: 1px; }

  /* OPINION PLAYER GRID */
  .opinion-row { padding: 10px 0; border-bottom: 1px solid var(--card-border); }
  .opinion-row:last-child { border: none; }
  .opinion-row-name { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }

  /* SCORE INPUT */
  .score-input-row { display: flex; align-items: center; gap: 12px; justify-content: center; }
  .score-big-input {
    width: 70px; font-family: 'Barlow Condensed', sans-serif; font-size: 2.5rem; font-weight: 900;
    text-align: center; background: var(--bg3); border: 2px solid var(--card-border);
    border-radius: 12px; color: var(--text); padding: 8px; outline: none;
  }
  .score-big-input:focus { border-color: var(--green); }

  /* TREND ARROWS */
  .trend-up2  { color: var(--green); font-size: 0.7rem; font-weight: 800; }
  .trend-up1  { color: var(--green); font-size: 0.7rem; }
  .trend-flat { color: var(--muted); font-size: 0.7rem; }
  .trend-down1{ color: var(--red); font-size: 0.7rem; }
  .trend-down2{ color: var(--red); font-size: 0.7rem; font-weight: 800; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0 } to { transform:translateY(0); opacity:1 } }
  @keyframes slideIn { from { transform: translateX(20px); opacity:0 } to { transform:translateX(0); opacity:1 } }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* ADMIN PANEL */
  .admin-bar {
    background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2);
    border-radius: 10px; padding: 10px 16px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .admin-bar span { color: var(--yellow); font-size: 0.85rem; font-weight: 600; }

  /* CHECKBOX */
  .check-row { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
  input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div>
        <h1>FÚTBOL<span>5</span></h1>
        <p>Armador de Equipos</p>
      </div>
    </div>
    <div class="session-bar" id="headerRight"></div>
  </header>

  <!-- TABS -->
  <nav class="tabs" id="mainTabs">
    <button class="active" onclick="setTab('jugar')">⚽ Jugar</button>
    <button onclick="setTab('historial')">📋 Historial</button>
    <button onclick="setTab('stats')">📊 Stats</button>
    <button onclick="setTab('admin')">🔧 Admin</button>
  </nav>

  <!-- CONTENT -->
  <div id="content"></div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toasts"></div>

<script>
// =========================================================
//  CONFIG
// =========================================================
const BACKEND_URL = 'https://f5-app.onrender.com';

const API = (() => {
  const stored = localStorage.getItem('apiUrl');
  return stored || BACKEND_URL;
})();

// =========================================================
//  STATE
// =========================================================
let state = {
  players: [],
  trends: {},
  me: JSON.parse(localStorage.getItem('me') || 'null'),
  tab: 'jugar',
  adminOk: localStorage.getItem('adminOk') === '1',
  adminPin: null,
};

// =========================================================
//  UTILS
// =========================================================
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.adminPin) headers['X-Admin-Pin'] = state.adminPin;
  const r = await fetch(API + path, { headers, ...opts });
  if (!r.ok) {
    const msg = await r.text();
    throw new Error(msg);
  }
  return r.json();
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c === null || c === undefined) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

// Slider doble: retorna { el, getMin, getMax }
// lblEl: elemento <span> donde mostrar "X–Y" (se actualiza automáticamente)
function mkRangeDouble(minVal, maxVal, lblEl, onChange) {
  const MIN = 1, MAX = 10;
  const pct = v => (v - MIN) / (MAX - MIN) * 100;
  const wrap = h('div', { class:'range-double' });
  const track = h('div', { class:'rd-track' });
  const fill = h('div', { class:'rd-fill' });
  track.appendChild(fill);
  wrap.appendChild(track);
  const mnInp = h('input', { type:'range', min:MIN, max:MAX, step:0.5, value:minVal });
  const mxInp = h('input', { type:'range', min:MIN, max:MAX, step:0.5, value:maxVal });
  const update = (e) => {
    let mnv = parseFloat(mnInp.value), mxv = parseFloat(mxInp.value);
    if (mnv > mxv) {
      if (!e || e.target === mnInp) { mxInp.value = mnv; mxv = mnv; }
      else { mnInp.value = mxv; mnv = mxv; }
    }
    fill.style.left = pct(mnv) + '%';
    fill.style.width = (pct(mxv) - pct(mnv)) + '%';
    if (lblEl) lblEl.textContent = `${mnv}–${mxv}`;
    onChange?.(mnv, mxv);
  };
  mnInp.oninput = update; mxInp.oninput = update;
  wrap.appendChild(mnInp); wrap.appendChild(mxInp);
  update();
  return wrap;
}

// Slider simple para visión (valor único — sin fill, solo marcador puntual)
function mkRangeSingle(val, lblEl, onChange) {
  const MIN = 1, MAX = 10;
  const wrap = h('div', { class:'range-double' });
  const track = h('div', { class:'rd-track' });
  // Sin fill; solo un dot que indica la posición exacta
  const dot = h('div', { style:'position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:var(--green);pointer-events:none;transition:left .1s' });
  track.appendChild(dot);
  wrap.appendChild(track);
  const inp = h('input', { type:'range', min:MIN, max:MAX, step:0.5, value:val });
  const update = () => {
    const v = parseFloat(inp.value);
    const pct = (v - MIN) / (MAX - MIN) * 100;
    dot.style.left = pct + '%';
    if (lblEl) lblEl.textContent = String(v);
    onChange?.(v);
  };
  inp.oninput = update;
  wrap.appendChild(inp);
  update();
  return wrap;
}

function ovr(p) { return (p.overall_combined ?? p.overall_expected)?.toFixed(1) || '—'; }

const TREND_LABEL = { up2:'▲▲ En racha', up1:'▲ Bien', flat:'— Regular', down1:'▼ Bajo', down2:'▼▼ Mal momento' };
const TREND_CLS   = { up2:'badge-up', up1:'badge-up', flat:'badge-flat', down1:'badge-down', down2:'badge-down' };
const TREND_ICON  = { up2:'▲▲', up1:'▲', flat:'—', down1:'▼', down2:'▼▼' };
const STREAK_FACTORS   = { up2:0.95, up1:0.70, flat:0.50, down1:0.30, down2:0.05 };
const LONG_TREND_DELTA = { up2:+0.15, up1:+0.08, flat:0.0, down1:-0.08, down2:-0.15 };
const LONG_TREND_LABEL = { up2:'▲▲', up1:'▲', flat:'—', down1:'▼', down2:'▼▼' };
const FIELD_W = { shot:0.9, passing:1.0, defense:1.0, vision:1.5, stamina:0.8, speed:0.6 };
const GK_W    = FIELD_W;  // En F5 el arquero juega como un jugador más

function blendedFactor(trend, long_trend) {
  const sf = STREAK_FACTORS[trend] ?? 0.50;
  const ld = LONG_TREND_DELTA[long_trend] ?? 0.0;
  return sf + ld;  // puede salir del [0,1]: -0.10 a 1.10
}

function ovrWithTrend(p, trend, long_trend = 'flat') {
  const factor = blendedFactor(trend, long_trend);
  const w = p.is_goalkeeper ? GK_W : FIELD_W;
  let total = 0;
  for (const a of ['shot','passing','defense','vision','stamina','speed']) {
    const rMin = p.combined_min?.[a] ?? p.attr_min?.[a] ?? 4;
    const rMax = p.combined_max?.[a] ?? p.attr_max?.[a] ?? 6;
    total += (rMin + factor * (rMax - rMin)) * w[a];
  }
  return total;
}

function attrEffective(p, a, factor) {
  const rMin = p.combined_min?.[a] ?? p.attr_min?.[a] ?? 4;
  const rMax = p.combined_max?.[a] ?? p.attr_max?.[a] ?? 6;
  return rMin + factor * (rMax - rMin);
}

function trendBadge(pid) {
  const t = state.trends[pid];
  if (!t) return '';
  return `<span class="badge ${TREND_CLS[t.trend]}">${TREND_LABEL[t.trend]}</span>`;
}

function playerLabel(p) {
  return p.name + (p.is_goalkeeper ? ' 🥅' : '');
}

function nameById(id) {
  const p = state.players.find(x => x.id === id);
  return p ? playerLabel(p) : `#${id}`;
}

// =========================================================
async function loadAll() {
  try {
    const [players, withOp, trends] = await Promise.all([
      api('/players'),
      api('/players/with_opinions').catch(() => []),
      api('/players/trends?lookback=4').catch(() => []),
    ]);
    // Mergear datos de opiniones en cada jugador
    const opMap = Object.fromEntries(withOp.map(p => [p.id, p]));
    state.players = players.map(p => ({
      ...p,
      overall_combined: opMap[p.id]?.overall_combined ?? p.overall_expected,
      combined:      opMap[p.id]?.combined      ?? {},
      combined_min:  opMap[p.id]?.combined_min  ?? {},
      combined_max:  opMap[p.id]?.combined_max  ?? {},
      attr_min:      opMap[p.id]?.attr_min       ?? {},
      attr_max:      opMap[p.id]?.attr_max       ?? {},
    }));
    state.trends = Object.fromEntries(trends.map(t => [t.player_id, t]));
  } catch(e) {
    toast('Error conectando con el servidor. Verificá la URL.', 'err');
  }
}

// ---- LOGIN ----
function renderLogin(root) {
  const wrap = h('div', { class: 'card' },
    h('div', { class: 'login-screen' },
      h('h2', {}, '¿Quién sos?'),
      h('p', {}, 'Elegí tu jugador para cargar opiniones y sinergias.'),
      (() => {
        const sel = h('select', { style: 'max-width:260px' },
          h('option', { value: '' }, '— Elegir jugador —'),
          ...state.players.map(p => {
            const o = h('option', { value: p.id }, playerLabel(p));
            return o;
          })
        );
        const btn = h('button', { class: 'btn btn-green', onClick: async () => {
          if (!sel.value) return;
          const chosen = state.players.find(p => p.id === Number(sel.value));

          const finishLogin = async () => {
            try {
              const allUsers = await api('/users');
              let user = allUsers.find(u => u.player_id === Number(sel.value))
                      || allUsers.find(u => (u.name||'').toLowerCase() === chosen.name.toLowerCase());
              if (!user) {
                user = await api('/users', { method:'POST', body: JSON.stringify({ name: chosen.name, is_admin: false, player_id: Number(sel.value) }) });
              } else if (user.player_id !== Number(sel.value)) {
                user = await api(`/users/${user.id}`, { method:'PUT', body: JSON.stringify({ ...user, player_id: Number(sel.value) }) });
              }
              state.me = user;
              localStorage.setItem('me', JSON.stringify(user));
              toast(`Bienvenido, ${chosen.name}!`);
              api(`/players/${chosen.id}/ping`, {method:'POST'}).catch(()=>{});
              renderContent();
            } catch(e) { toast('Error al ingresar', 'err'); }
          };

          try {
            btn.disabled = true; btn.textContent = '...';
            if (state.adminOk) {
              await finishLogin();
            } else {
              const ps = await api(`/players/${chosen.id}/password_status`);
              if (ps.has_password) {
                openPasswordCheckModal(chosen, finishLogin, () => { btn.disabled = false; btn.textContent = 'Ingresar'; });
              } else {
                openSetPasswordPromptModal(chosen, finishLogin, () => { btn.disabled = false; btn.textContent = 'Ingresar'; });
              }
            }
          } catch(e) {
            btn.disabled = false; btn.textContent = 'Ingresar';
            toast('Error al conectar', 'err');
          }
        }}, 'Ingresar');
        return h('div', { style: 'display:flex;gap:10px;align-items:center;' }, sel, btn);
      })()
    )
  );
  root.appendChild(wrap);
}

function openSetPasswordPromptModal(player, onSuccess, onCancel) {
  const overlay = h('div', { class:'overlay', onClick: e => { if(e.target===overlay){ overlay.remove(); onCancel?.(); } } });
  const modal = h('div', { class:'modal', style:'max-width:400px' });
  modal.appendChild(h('div', { class:'modal-title' },
    h('span',{},`👤 Bienvenido, ${player.name}!`),

  ));
  modal.appendChild(h('p',{style:'color:var(--muted2);font-size:.9rem;margin-bottom:20px'},'¿Querés poner una contraseña a tu perfil? Podés hacerlo ahora o más tarde.'));

  let showingForm = false;
  const contentWrap = h('div',{});
  modal.appendChild(contentWrap);

  const renderOptions = () => {
    contentWrap.innerHTML = '';
    if (!showingForm) {
      const btnRow = h('div',{style:'display:flex;flex-direction:column;gap:8px'});
      btnRow.appendChild(h('button',{class:'btn btn-green',style:'width:100%',onClick:()=>{ showingForm=true; renderOptions(); }},'🔒 Establecer contraseña'));
      btnRow.appendChild(h('button',{class:'btn btn-ghost',style:'width:100%',onClick:()=>{ overlay.remove(); onSuccess(); }},'Ingresar sin contraseña'));
      contentWrap.appendChild(btnRow);
    } else {
      const inp = h('input',{type:'password',placeholder:'Nueva contraseña'});
      const inp2 = h('input',{type:'password',placeholder:'Repetir contraseña',style:'margin-top:6px'});
      contentWrap.appendChild(h('div',{class:'field'},h('label',{},'Nueva contraseña'),inp));
      contentWrap.appendChild(h('div',{class:'field'},inp2));
      const errMsg = h('div',{style:'color:var(--red);font-size:.82rem;margin-bottom:8px;display:none'},'Las contraseñas no coinciden');
      contentWrap.appendChild(errMsg);
      const btnRow = h('div',{style:'display:flex;gap:8px'});
      const saveBtn = h('button',{class:'btn btn-green',style:'flex:1',onClick:async()=>{
        if (!inp.value) return;
        if (inp.value !== inp2.value) { errMsg.style.display='block'; return; }
        saveBtn.disabled=true; saveBtn.textContent='...';
        try {
          await api(`/players/${player.id}/set_password`,{method:'POST',body:JSON.stringify({password:inp.value})});
          overlay.remove();
          toast('Contraseña establecida ✓');
          onSuccess();
        } catch(e) { toast('Error: '+e.message,'err'); saveBtn.disabled=false; saveBtn.textContent='Guardar'; }
      }},'Guardar');
      btnRow.appendChild(saveBtn);
      btnRow.appendChild(h('button',{class:'btn btn-ghost',onClick:()=>{ showingForm=false; renderOptions(); }},'Cancelar'));
      contentWrap.appendChild(btnRow);
      setTimeout(() => inp.focus(), 100);
    }
  };
  renderOptions();
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

// ---- SYNERGY ----
function renderSynergy(root) {
  const myPlayer = state.players.find(p => p.id === state.me?.player_id);
  if (!myPlayer) return;

  const others = state.players.filter(p => p.id !== myPlayer.id);
  let prefs = {};

  const card = h('div', { class: 'card' });
  card.appendChild(h('div', { class:'card-title' }, '🤝 Mis sinergias'));

  const loadPrefs = async () => {
    const all = await api('/preferences');
    prefs = Object.fromEntries(all.filter(x => x.src_id === myPlayer.id).map(x => [x.dst_id, x.weight]));
    renderRows();
  };

  const rowsWrap = h('div', {});
  card.appendChild(rowsWrap);

  const synLabels = { 2:'😍 Muy buena', 1:'👍 Buena', 0:'😐 Neutral', '-1':'👎 Mala', '-2':'💀 Muy mala' };

  function renderRows() {
    rowsWrap.innerHTML = '';
    others.forEach(o => {
      const w = prefs[o.id] ?? 0;
      const row = h('div', { class:'syn-row' });
      row.appendChild(h('span', { style:'font-weight:600;font-size:.9rem' }, o.name));
      const sel = h('div', { class:'syn-sel' });
      [-2,-1,0,1,2].forEach(v => {
        const icons = { 2:'💚', 1:'👍', 0:'–', '-1':'👎', '-2':'💔' };
        const isActive = prefs[o.id]===v || (v===0 && prefs[o.id]===undefined);
        const activeClass = isActive ? (v>0 ? ` active-p${v}` : v<0 ? ` active-m${Math.abs(v)}` : ' active-0') : '';
        const btn = h('button', { class:`syn-btn${activeClass}`,
          title: synLabels[v], onClick: () => {
          prefs[o.id] = v;
          renderRows();
        }}, icons[v]);
        sel.appendChild(btn);
      });
      row.appendChild(sel);
      rowsWrap.appendChild(row);
    });
  }

  const saveBtn = h('button', { class:'btn btn-green', style:'margin-top:12px', onClick: async () => {
    try {
      for (const o of others) {
        await api('/preferences', { method:'POST', body: JSON.stringify({ src_id: myPlayer.id, dst_id: o.id, weight: prefs[o.id] ?? 0 })});
      }
      toast('Sinergias guardadas ✓');
    } catch(e) { toast('Error: '+e.message,'err'); }
  }}, 'Guardar sinergias');
  card.appendChild(saveBtn);
  root.appendChild(card);
  loadPrefs();
}

    listWrap.innerHTML = '<div class="spinner" style="display:block;margin:12px auto"></div>';

      if (!matches.length) {

          col.appendChild(h('div', { class:`team-header ${cls}` }, cls==='a'?'Equipo A':'Equipo B'));

            const row = h('div', { class:'team-player' }, h('span',{},playerLabel(p)));
            const t = state.trends[id];
            if (t) {
              const icons = h('span',{style:'display:flex;gap:2px;margin-left:auto;align-items:center'});
              if (t.trend !== 'flat') {
                const col2 = t.trend.startsWith('up')?'var(--green)':'var(--red)';
                icons.appendChild(h('span',{style:`color:${col2};font-size:.7rem`,title:'Racha corta'},TREND_ICON[t.trend]));
              }
              const lt = t.long_trend || 'flat';
              if (lt !== 'flat') {
                const col3 = lt.startsWith('up')?'var(--green)':'var(--red)';
                icons.appendChild(h('span',{style:`color:${col3};font-size:.55rem;opacity:.65`,title:'Tendencia larga'},LONG_TREND_LABEL[lt]));
              }
              if (icons.children.length) row.appendChild(icons);
            }
            list.appendChild(row);
          });
          col.appendChild(list);
          return col;
        };
        const vsDiv = h('div',{style:'display:flex;align-items:center;justify-content:center;font-family:"Barlow Condensed",sans-serif;font-size:1.2rem;font-weight:900;color:var(--muted);padding-top:32px'},'VS');
        teams.appendChild(mkTeam(m.team_a,'a'));
        teams.appendChild(vsDiv);
        teams.appendChild(mkTeam(m.team_b,'b'));
        mc.appendChild(teams);

        if (state.adminOk) {
          const resultBtn = h('button', { class:'btn btn-green btn-sm', style:'margin-top:12px', onClick: () => openResultModal(m, load) }, '⚽ Cargar resultado');
          mc.appendChild(resultBtn);
        }
        listWrap.appendChild(mc);
      });
    } catch(e) { toast('Error cargando partidos','err'); }
  };
  load();
  root.appendChild(card);
}

// ---- RESULT MODAL ----
function openResultModal(match, playedAtOrDone, onDone) {
  let playedAt = null;
  if (typeof playedAtOrDone === 'function') { onDone = playedAtOrDone; }
  else { playedAt = playedAtOrDone; }
  const overlay = h('div', { class:'overlay', onClick: e => { if(e.target===overlay) overlay.remove(); } });
  const modal = h('div', { class:'modal' });
  modal.appendChild(h('div', { class:'modal-title' },
    h('span',{},'Cargar resultado'),
    h('button',{class:'close-btn',onClick:()=>overlay.remove()},'×')
  ));

  // ---- GANADOR ----
  let winner = 'A';
  const winnerBtnsMap = {};
  const winnerRow = h('div',{style:'display:flex;gap:8px;margin-bottom:14px'});
  [['A','Equipo A'],['D','Empate'],['B','Equipo B']].forEach(([val, lbl]) => {
    const btn = h('button',{class:`winner-btn${winner===val?' active-'+val.toLowerCase():''}`,onClick:()=>{
      winner = val;
      Object.entries(winnerBtnsMap).forEach(([v,b]) => b.className = `winner-btn${winner===v?' active-'+v.toLowerCase():''}`);
      diffRow.style.display = val==='D' ? 'none' : 'flex';
      renderRanks();
    }}, lbl);
    winnerBtnsMap[val] = btn;
    winnerRow.appendChild(btn);
  });
  modal.appendChild(h('div',{style:'margin-bottom:4px;font-size:.8rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.5px'},'¿Quién ganó?'));
  modal.appendChild(winnerRow);

  // ---- DIFERENCIA ----
  const inDiff = h('input',{type:'number',min:0,max:99,class:'score-big-input',value:0,style:'width:72px;text-align:center'});
  const diffRow = h('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:16px'});
  diffRow.appendChild(h('span',{style:'font-size:.85rem;color:var(--muted)'},'Diferencia de goles:'));
  diffRow.appendChild(inDiff);
  modal.appendChild(diffRow);

  // ---- RANKING drag & drop ----
  const rankWrap = h('div',{});
  modal.appendChild(rankWrap);

  // ranked = [pid, pid, ...] in order
  let rankW = [], rankL = [];

  function mkRankDrag(label, ids, ranked) {
    const sec = h('div',{style:'margin-bottom:16px'});
    sec.appendChild(h('div',{style:'font-size:.8rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px'},label));

    const dropZone = h('div',{class:'rank-drop-zone'});
    const bench = h('div',{class:'rank-bench'});

    let dragSrcIdx = null;

    function render() {
      dropZone.innerHTML = '';
      bench.innerHTML = '';

      if (!ranked.length) {
        dropZone.appendChild(h('div',{style:'text-align:center;color:var(--muted);font-size:.8rem;padding:8px'},'Click en un jugador para agregarlo al ranking'));
      }

      ranked.forEach((pid, idx) => {
        const p = state.players.find(x=>x.id===pid);
        if (!p) return;
        const item = h('div',{class:'rank-item',draggable:'true'});
        item.appendChild(h('span',{style:'font-family:"Barlow Condensed",sans-serif;font-size:1.1rem;font-weight:900;color:var(--green);min-width:26px'},`${idx+1}°`));
        item.appendChild(h('span',{style:'flex:1;font-size:.9rem'},playerLabel(p)));
        item.appendChild(h('span',{style:'color:var(--muted);font-size:.9rem;cursor:pointer;padding:0 4px',onClick:(e)=>{ e.stopPropagation(); ranked.splice(idx,1); render(); }},'✕'));

        item.ondragstart = () => { dragSrcIdx = idx; setTimeout(()=>item.classList.add('dragging'),0); };
        item.ondragend = () => { item.classList.remove('dragging'); dragSrcIdx = null; };
        item.ondragover = e => { e.preventDefault(); };
        item.ondrop = e => {
          e.preventDefault();
          if (dragSrcIdx === null || dragSrcIdx === idx) return;
          const moved = ranked.splice(dragSrcIdx,1)[0];
          ranked.splice(idx,0,moved);
          render();
        };
        dropZone.appendChild(item);
      });

      // drag-over highlight on zone itself
      dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag-over'); };
      dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
      dropZone.ondrop = e => {
        e.preventDefault(); dropZone.classList.remove('drag-over');
        if (dragSrcIdx !== null) return; // handled by item
      };

      ids.filter(id => !ranked.includes(id)).forEach(id => {
        const p = state.players.find(x=>x.id===id);
        if (!p) return;
        const chip = h('button',{class:'rank-bench-chip',onClick:()=>{ ranked.push(id); render(); }},playerLabel(p));
        bench.appendChild(chip);
      });
    }

    render();
    sec.appendChild(dropZone);
    sec.appendChild(bench);
    return sec;
  }

  function renderRanks() {
    rankWrap.innerHTML = '';
    rankW = []; rankL = [];
    if (winner === 'D') return;
    const winTeam = winner==='A' ? match.team_a : match.team_b;
    const loseTeam = winner==='A' ? match.team_b : match.team_a;
    rankWrap.appendChild(mkRankDrag('🏆 Ranking ganadores', winTeam, rankW));
    rankWrap.appendChild(mkRankDrag('👟 Ranking perdedores', loseTeam, rankL));
  }
  renderRanks();

  const saveBtn = h('button',{class:'btn btn-green',style:'margin-top:4px;width:100%',onClick:async()=>{
    try {
      const body = {
        goal_diff: parseInt(inDiff.value)||0,
        winner_team: winner,
        rank_winners: rankW,
        rank_losers: rankL,
      };
      if (playedAt) body.played_at = playedAt;
      await api(`/matches/${match.id}/result`,{method:'PUT',body:JSON.stringify(body)});
      toast('Resultado cargado ✓');
      overlay.remove();
      await loadAll();
      onDone?.();
    } catch(e) { toast('Error: '+e.message,'err'); }
  }},'✓ Guardar resultado');
  modal.appendChild(saveBtn);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

// ---- TEAM GENERATOR ----
function renderTeamGenerator(root) {
  const card = h('div', { class:'card' });
  card.appendChild(h('div', { class:'card-title' }, '⚙️ Generador de equipos'));

  const selected = new Set();
  const resultWrap = h('div', {});

  const listWrap = h('div', { style:'max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:12px' });

  function renderList() {
    listWrap.innerHTML = '';
    state.players.forEach(p => {
      const chip = h('div', { class:`player-chip${selected.has(p.id)?' selected':''}${p.is_goalkeeper?' gk':''}` });
      const left2 = h('div', { style:'display:flex;align-items:center;gap:8px' });
      const cb = h('input', { type:'checkbox' });
      cb.checked = selected.has(p.id);
      cb.onchange = () => { if(cb.checked) selected.add(p.id); else selected.delete(p.id); renderList(); };
      left2.appendChild(cb);
      left2.appendChild(h('span', { class:'player-name' }, p.name));
      if (p.is_goalkeeper) left2.appendChild(h('span', { class:'badge badge-gk' }, 'GK'));
      const t = state.trends[p.id];
      if (t) {
        left2.appendChild(h('span', { class:`badge ${TREND_CLS[t.trend]}`, title:'Racha corta' }, TREND_ICON[t.trend]));
        const lt = t.long_trend || 'flat';
        if (lt !== 'flat') {
          left2.appendChild(h('span', { class:`badge ${TREND_CLS[lt]}`, style:'opacity:.65;font-size:.55rem', title:'Tendencia larga' }, LONG_TREND_LABEL[lt]));
        }
      }
      chip.appendChild(left2);
      chip.appendChild(h('span', { class:'player-ovr' }, ovr(p)));
      chip.onclick = (e) => { if (e.target === cb || e.target.type === 'checkbox') return; cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); };
      listWrap.appendChild(chip);
    });
    counter.textContent = `${selected.size}/10 seleccionados`;
    genBtn.disabled = selected.size !== 10;
  }

  const counter = h('div', { style:'font-size:.82rem;color:var(--muted);margin-bottom:8px' }, '0/10 seleccionados');

  // Toggle sinergia
  const synChk = h('input', { type:'checkbox', id:'synChk', checked: true, style:'margin-right:6px' });
  const synLabel = h('label', { for:'synChk', style:'font-size:.82rem;color:var(--muted2);cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:10px' },
    synChk, '⚡ Considerar sinergia entre jugadores'
  );

  const genBtn = h('button', { class:'btn btn-green', disabled: true, onClick: async () => {
    genBtn.disabled = true;
    genBtn.innerHTML = '<span class="spinner"></span> Generando...';
    try {
      const options = await api('/generate_teams', { method:'POST', body: JSON.stringify({
        player_ids: [...selected], lambda_syn: 10, use_synergy: synChk.checked
      })});
      renderResult(options);
    } catch(e) { toast('Error: '+e.message,'err'); }
    genBtn.disabled = selected.size !== 10;
    genBtn.textContent = 'Generar equipos';
  }}, 'Generar equipos');

  card.appendChild(counter);
  card.appendChild(listWrap);
  renderList();
  card.appendChild(synLabel);
  card.appendChild(genBtn);
  card.appendChild(resultWrap);

  let selectedOpt = 0;

  function renderResult(options) {
    resultWrap.innerHTML = '';

    // Tab pills para cada opción
    const tabRow = h('div', { style:'display:flex;gap:6px;margin-top:14px;margin-bottom:12px;flex-wrap:wrap' });
    options.forEach((opt, i) => {
      const btn = h('button', {
        class: `btn btn-sm ${i === selectedOpt ? 'btn-green' : 'btn-ghost'}`,
        onClick: () => { selectedOpt = i; renderResult(options); }
      }, `Opción ${i+1}  ·  Dif: ${opt.score_diff.toFixed(1)}`);
      tabRow.appendChild(btn);
    });
    resultWrap.appendChild(tabRow);

    const res = options[selectedOpt];

    const mkTeam = (ids, cls, label) => {
      const box = h('div', { class:'team-box' });
      const avgOvr = (ids.reduce((s,id)=>{const p=state.players.find(x=>x.id===id);return s+(p?(p.overall_combined??p.overall_expected):0);},0)/ids.length).toFixed(1);
      box.appendChild(h('div', { class:`team-header ${cls}` }, label,
        h('span',{style:'font-size:.8rem;opacity:.7'},'OVR: '+avgOvr)
      ));
      const list = h('div', { class:'team-list' });
      ids.forEach(id => {
        const p = state.players.find(x=>x.id===id);
        if (!p) return;
        const row = h('div', { class:'team-player' });
        row.appendChild(h('span', {}, playerLabel(p)));
        const t = state.trends[id];
        if (t) {
          const icons = h('span',{style:'display:flex;gap:2px;margin-left:auto;align-items:center'});
          if (t.trend !== 'flat') {
            const col = t.trend.startsWith('up') ? 'var(--green)' : 'var(--red)';
            icons.appendChild(h('span',{style:`color:${col};font-size:.7rem`}, TREND_ICON[t.trend]));
          }
          const lt = t.long_trend || 'flat';
          if (lt !== 'flat') {
            const col2 = lt.startsWith('up') ? 'var(--green)' : 'var(--red)';
            icons.appendChild(h('span',{style:`color:${col2};font-size:.55rem;opacity:.65`}, LONG_TREND_LABEL[lt]));
          }
          if (icons.children.length) row.appendChild(icons);
        }
        list.appendChild(row);
      });
      box.appendChild(list);
      return box;
    };

    const teamsGrid = h('div', { style:'display:grid;grid-template-columns:1fr 1fr;gap:10px' });
    teamsGrid.appendChild(mkTeam(res.team_a, 'a', 'Equipo A'));
    teamsGrid.appendChild(mkTeam(res.team_b, 'b', 'Equipo B'));
    resultWrap.appendChild(teamsGrid);

    resultWrap.appendChild(h('div', { style:'text-align:center;color:var(--muted);font-size:.8rem;margin:8px 0' },
      `Diferencia de nivel: ${res.score_diff.toFixed(1)} · Sinergia total: ${res.syn_sum.toFixed(1)}`
    ));

    // Predictor de resultado
    const predWrap = h('div', { style:'margin:10px 0' });
    const predBtn = h('button', { class:'btn btn-ghost btn-sm', onClick: async () => {
      predBtn.disabled = true;
      predBtn.innerHTML = '<span class="spinner"></span>';
      try {
        const pred = await api('/predict_result', { method:'POST', body: JSON.stringify({
          team_a: res.team_a, team_b: res.team_b, lambda_syn: 10, use_synergy: synChk.checked
        })});
        predWrap.innerHTML = '';
        const probA = pred.prob_a;
        const probB = pred.prob_b;
        const colA = probA >= probB ? 'var(--green)' : 'rgba(255,255,255,0.15)';
        const colB = probB > probA ? 'var(--green)' : 'rgba(255,255,255,0.15)';
        predWrap.appendChild(h('div', { style:'font-size:.75rem;color:var(--muted);text-align:center;margin-bottom:4px' }, '⚽ Predicción de resultado'));
        const bar = h('div', { style:'display:flex;border-radius:8px;overflow:hidden;height:32px;font-size:.88rem;font-weight:700' });
        bar.appendChild(h('div', { style:`flex:${Math.round(probA)};background:${colA};display:flex;align-items:center;justify-content:center;color:#fff` }, `A  ${probA}%`));
        bar.appendChild(h('div', { style:`flex:${Math.round(probB)};background:${colB};display:flex;align-items:center;justify-content:center;color:#fff` }, `${probB}%  B`));
        predWrap.appendChild(bar);
        if (pred.syn_a !== 0 || pred.syn_b !== 0) {
          predWrap.appendChild(h('div', { style:'text-align:center;font-size:.72rem;color:var(--muted);margin-top:3px' },
            `Sinergia A: ${pred.syn_a} · Sinergia B: ${pred.syn_b}`
          ));
        }
      } catch(e) { predWrap.innerHTML = ''; predBtn.disabled = false; predBtn.textContent = '⚽ Predecir resultado'; toast('Error: '+e.message,'err'); }
    }}, '⚽ Predecir resultado');
    predWrap.appendChild(predBtn);
    resultWrap.appendChild(predWrap);

    if (state.adminOk) {
      const saveBtn = h('button', { class:'btn btn-green btn-sm', style:'margin-top:4px', onClick: async () => {
        try {
          await api('/matches', { method:'POST', body: JSON.stringify({ team_a: res.team_a, team_b: res.team_b })});
          toast('Partido agendado para el próximo jueves ✓');
          renderContent();
        } catch(e) { toast('Error: '+e.message,'err'); }
      }}, `📅 Agendar Opción ${selectedOpt+1}`);
      resultWrap.appendChild(saveBtn);
    }
  }

  root.appendChild(card);
}

// ---- PARTIDO MANUAL (solo admin) ----
function renderManualMatch(root) {
  const card = h('div', { class:'card' });
  card.appendChild(h('div', { class:'card-title' }, '📝 Partido Manual'));

  const today = new Date().toISOString().slice(0,10);
  const dateInput = h('input', { type:'date', value: today });
  card.appendChild(h('div', { class:'field' },
    h('label', {}, 'Fecha del partido'),
    dateInput
  ));

  const teamA = new Set(), teamB = new Set();
  const counterA = h('div', { style:'font-size:.8rem;color:var(--muted);margin-bottom:5px' }, '0/5');
  const counterB = h('div', { style:'font-size:.8rem;color:var(--muted);margin-bottom:5px' }, '0/5');
  const listA = h('div', { style:'display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto' });
  const listB = h('div', { style:'display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto' });

  const saveBtn = h('button', { class:'btn btn-green', disabled: true, onClick: async () => {
    const d = dateInput.value || today;
    const playedAt = d + 'T21:00:00';
    try {
      const match = await api('/matches', { method:'POST', body: JSON.stringify({
        team_a: [...teamA], team_b: [...teamB], scheduled_at: playedAt
      })});
      openResultModal(match, playedAt, () => renderContent());
    } catch(e) { toast('Error: '+e.message, 'err'); }
  }}, '⚽ Continuar → cargar resultado');

  function renderLists() {
    [listA, listB].forEach(l => l.innerHTML = '');
    counterA.textContent = `${teamA.size}/5`;
    counterB.textContent = `${teamB.size}/5`;
    state.players.forEach(p => {
      const mkChip = (myTeam, otherTeam, onClick) => {
        const selected = myTeam.has(p.id);
        const blocked = otherTeam.has(p.id);
        const chip = h('div', {
          class: `player-chip${selected ? ' selected' : ''}${p.is_goalkeeper ? ' gk' : ''}`,
          style: `cursor:${blocked ? 'default' : 'pointer'};opacity:${blocked ? 0.35 : 1};padding:5px 10px`
        });
        chip.appendChild(h('span', { class:'player-name', style:'font-size:.85rem' }, p.name));
        if (p.is_goalkeeper) chip.appendChild(h('span', { class:'badge badge-gk' }, 'GK'));
        if (!blocked) chip.onclick = onClick;
        return chip;
      };
      listA.appendChild(mkChip(teamA, teamB, () => {
        if (teamA.has(p.id)) teamA.delete(p.id); else if (teamA.size < 5) teamA.add(p.id);
        renderLists();
      }));
      listB.appendChild(mkChip(teamB, teamA, () => {
        if (teamB.has(p.id)) teamB.delete(p.id); else if (teamB.size < 5) teamB.add(p.id);
        renderLists();
      }));
    });
    saveBtn.disabled = teamA.size !== 5 || teamB.size !== 5;
  }

  const grid = h('div', { style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px' });
  const boxA = h('div');
  boxA.appendChild(h('div', { style:'font-family:"Barlow Condensed",sans-serif;font-weight:700;color:var(--green);margin-bottom:4px' }, 'EQUIPO A'));
  boxA.appendChild(counterA); boxA.appendChild(listA);
  const boxB = h('div');
  boxB.appendChild(h('div', { style:'font-family:"Barlow Condensed",sans-serif;font-weight:700;color:var(--green);margin-bottom:4px' }, 'EQUIPO B'));
  boxB.appendChild(counterB); boxB.appendChild(listB);
  grid.appendChild(boxA); grid.appendChild(boxB);
  card.appendChild(grid);
  card.appendChild(saveBtn);
  renderLists();
  root.appendChild(card);
}
