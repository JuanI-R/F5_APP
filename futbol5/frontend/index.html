          const diffLabel = draw ? 'Empate' : `+${m.goal_diff ?? 0}`;
          scoreRow.appendChild(h('span',{style:`font-size:1.1rem;font-weight:700;color:${winA?'#93c5fd':'var(--muted)'}; flex:1;text-align:right`},'Equipo A'));
          scoreRow.appendChild(h('span',{style:`font-family:"Barlow Condensed",sans-serif;font-size:2.5rem;font-weight:900;color:${winA?'var(--blue)':winB?'var(--red)':'var(--yellow)'};padding:0 10px`}, diffLabel));
          scoreRow.appendChild(h('span',{style:`font-size:1.1rem;font-weight:700;color:${winB?'#fca5a5':'var(--muted)'}; flex:1;text-align:left`},'Equipo B'));
          mc.appendChild(scoreRow);

          if (draw) mc.appendChild(h('div',{style:'text-align:center;font-size:.85rem;color:var(--yellow);margin-bottom:8px'},'🤝 Empate'));
          else mc.appendChild(h('div',{style:`text-align:center;font-size:.85rem;color:${winA?'#93c5fd':'#fca5a5'};margin-bottom:8px`},`🏆 Ganó ${winA?'Equipo A':'Equipo B'}`));
        } else {
          const dateStr = m.scheduled_at ? new Date(m.scheduled_at).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}) : 'Pendiente';
          mc.appendChild(h('div',{style:'font-size:.85rem;color:var(--muted2);margin-bottom:10px'},`📅 ${dateStr}`));
        }

        const teamsGrid = h('div', { style:'display:grid;grid-template-columns:1fr 1fr;gap:8px' });
        const mkT = (ids, cls) => {
          const isRecorded = m.is_recorded;
          const teamLabel = cls==='a' ? 'Equipo A' : 'Equipo B';
          const teamWon = (cls==='a' && m.winner_team==='A') || (cls==='b' && m.winner_team==='B');
          const isDraw = m.winner_team === 'D';

          // Determinar ranking de este equipo
          const rankArr = isRecorded
            ? (teamWon ? (m.rank_winners||[]) : (m.rank_losers||[]))
            : [];

          // Ordenar jugadores por su posición en el ranking (los que no tienen rank van al final)
          const sorted = [...ids].sort((a, b) => {
            const pa = rankArr.indexOf(a);
            const pb = rankArr.indexOf(b);
            if (pa === -1 && pb === -1) return 0;
            if (pa === -1) return 1;
            if (pb === -1) return -1;
            return pa - pb;
          });

          const box = h('div', { class:'team-box' });
          // Header con indicador de victoria
          let headerExtra = '';
          if (isRecorded && !isDraw) headerExtra = teamWon ? ' 🏆' : '';
          const headerStyle = isRecorded && !isDraw
            ? (teamWon ? 'background:rgba(59,130,246,.2);border-bottom:2px solid var(--blue)' : 'background:rgba(239,68,68,.12);border-bottom:1px solid rgba(239,68,68,.25)')
            : '';
          const hdr = h('div', { class:`team-header ${cls}`, style: headerStyle }, `${teamLabel}${headerExtra}`);
          box.appendChild(hdr);

          const list = h('div', { class:'team-list' });
          sorted.forEach(id => {
            const p = state.players.find(x=>x.id===id);
            const rankPos = rankArr.indexOf(id); // 0-based
            const row = h('div', { class:'team-player' });

            // Número de ranking
            if (isRecorded && rankPos >= 0) {
              const colors = teamWon
                ? ['#fbbf24','#e2e8f0','#cd7f32','var(--muted2)','var(--muted2)'] // oro, plata, bronce, ...
                : ['var(--red)','var(--muted2)','var(--muted2)','var(--muted2)','var(--muted2)'];
              row.appendChild(h('span',{class:'rank-num',style:`color:${colors[rankPos]||'var(--muted)'}`},`${rankPos+1}°`));
            } else {
              row.appendChild(h('span',{class:'rank-num'}));
            }

            row.appendChild(h('span',{style:`font-weight:${isRecorded&&rankPos===0?'700':'400'}`}, p ? playerLabel(p) : `#${id}`));

            // Badge ganador/perdedor
            if (isRecorded && !isDraw) {
              if (teamWon && rankPos === 0) row.appendChild(h('span',{class:'badge badge-win',style:'margin-left:auto'},'MVP'));
              else if (!teamWon && rankPos === 0) row.appendChild(h('span',{class:'badge badge-loss',style:'margin-left:auto'},'−'));
            }

            list.appendChild(row);
          });
          box.appendChild(list);
          return box;
        };
        teamsGrid.appendChild(mkT(m.team_a,'a'));
        teamsGrid.appendChild(mkT(m.team_b,'b'));
        mc.appendChild(teamsGrid);

        if (state.adminOk) {
          const actions = h('div',{style:'display:flex;gap:6px;margin-top:10px'});
          if (!m.is_recorded) {
            actions.appendChild(h('button',{class:'btn btn-green btn-sm',onClick:()=>openResultModal(m,()=>{load();})}, '⚽ Cargar resultado'));
          }
          actions.appendChild(h('button',{class:'btn btn-red btn-sm',onClick:async()=>{
            if(!confirm(`¿Eliminar partido #${m.id}?`)) return;
            await api(`/matches/${m.id}`,{method:'DELETE'});
            toast('Partido eliminado');
            load();
          }}, '🗑 Borrar'));
          mc.appendChild(actions);
        }

        listWrap.appendChild(mc);
      });
    } catch(e) { toast('Error cargando historial','err'); }
  };
  load();
  root.appendChild(card);
}

// =========================================================
//  PLAYER DETAIL MODAL
// =========================================================
async function openPlayerModal(player, trendsMap) {
  const attrs = ['shot','passing','defense','vision','stamina','speed'];
  const attrLabels = { shot:'Disparo', passing:'Pase', defense:'Defensa', vision:'Visión', stamina:'Físico', speed:'Velocidad' };

  const overlay = h('div', { class:'overlay', onClick: e => { if(e.target===overlay) overlay.remove(); } });
  const modal = h('div', { class:'modal' });
  modal.appendChild(h('div', { class:'modal-title' },
    h('span',{},player.name + (player.is_goalkeeper?' 🥅':'')),
    h('button',{class:'close-btn',onClick:()=>overlay.remove()},'×')
  ));

  const t = trendsMap[player.id];
  if (t) {
    const badgeRow = h('div',{style:'margin-bottom:14px;display:flex;align-items:center;gap:8px'});
    badgeRow.appendChild(h('span',{class:`badge ${TREND_CLS[t.trend]}`,title:'Racha corta (4 partidos)'},TREND_LABEL[t.trend]));
    const lt = t.long_trend || 'flat';
    if (lt !== 'flat') {
      badgeRow.appendChild(h('span',{class:`badge ${TREND_CLS[lt]}`,style:'opacity:.65;font-size:.6rem',title:'Tendencia larga (8 partidos)'},LONG_TREND_LABEL[lt]));
    }
    badgeRow.appendChild(h('span',{style:'font-size:.8rem;color:var(--muted)'},'Forma reciente'));
    modal.appendChild(badgeRow);
  }

  const spinner = h('div',{class:'spinner',style:'display:block;margin:20px auto'});
  modal.appendChild(spinner);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  try {
    const [history, partners] = await Promise.all([
      api(`/players/${player.id}/history`),
      api(`/players/${player.id}/partners`),
    ]);
    spinner.remove();

    // ── Estadísticas globales ──
    if (history.length) {
      const gp = history.length;
      const wins = history.filter(e=>e.result==='W').length;
      const draws = history.filter(e=>e.result==='D').length;
      const losses = history.filter(e=>e.result==='L').length;
      const pts = history.reduce((s,e)=>s+e.perf_score,0);
      const winRate = Math.round(wins/gp*100);

      const statsRow = h('div',{style:'display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px'});
      const mkStat = (val, lbl, color='var(--text)') =>
        h('div',{style:'background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:8px 4px;text-align:center'},
          h('div',{style:`font-family:"Barlow Condensed",sans-serif;font-size:1.3rem;font-weight:900;color:${color}`},String(val)),
          h('div',{style:'font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px'},lbl)
        );
      statsRow.appendChild(mkStat(gp,'PJ'));
      statsRow.appendChild(mkStat(wins,'G','var(--green)'));
      statsRow.appendChild(mkStat(draws,'E','var(--yellow)'));
      statsRow.appendChild(mkStat(losses,'P','var(--red)'));
      statsRow.appendChild(mkStat(winRate+'%','%V', winRate>=50?'var(--green)':'var(--red)'));
      modal.appendChild(statsRow);

      // Pts acumulados + barra de forma últimos 5
      const last5 = history.slice(0,5);
      const formRow = h('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:16px'});
      formRow.appendChild(h('span',{style:'font-size:.75rem;color:var(--muted)'},'Última forma:'));
      last5.forEach(e => {
        const c = e.result==='W'?'var(--green)':e.result==='L'?'var(--red)':'var(--yellow)';
        formRow.appendChild(h('span',{style:`font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:.95rem;color:${c}`},e.result));
      });
      formRow.appendChild(h('span',{style:'margin-left:auto;font-family:"Barlow Condensed",sans-serif;font-size:1rem;font-weight:700;color:'+(pts>=0?'var(--green)':'var(--red)')},
        (pts>0?'+':'')+pts+' pts total'));
      modal.appendChild(formRow);
    }

    // ── Atributos ──
    if (player.combined && Object.keys(player.combined).length) {
      const trendKey     = t?.trend      || 'flat';
      const longTrendKey = t?.long_trend || 'flat';
      const tFactor = blendedFactor(trendKey, longTrendKey);
      modal.appendChild(h('div',{style:'font-size:.75rem;color:var(--muted2);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px'},'Atributos'));

      if (state.adminOk && player.attr_min && player.attr_max) {
        // Vista detallada para admin:
        // Rango del admin (attr_min/attr_max) define la escala — igual que el backend
        // combined_min/combined_max son el promedio de opiniones (info adicional)
        const adminAttrWrap = h('div',{style:'margin-bottom:16px;display:flex;flex-direction:column;gap:6px'});
        attrs.forEach(a => {
          const rMin = player.combined_min?.[a] ?? player.attr_min?.[a] ?? 4;
          const rMax = player.combined_max?.[a] ?? player.attr_max?.[a] ?? 6;
          const isSingle = Math.abs(rMax - rMin) < 0.01; // visión u otro attr con valor único
          const effective = attrEffective(player, a, tFactor);

          const row = h('div',{style:'background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:8px 10px'});
          const top = h('div',{style:'display:flex;justify-content:space-between;align-items:center'});
          const labelTxt = attrLabels[a] + (isSingle ? ' 👁️' : '');
          top.appendChild(h('span',{style:'font-size:.75rem;color:var(--muted);font-weight:600'},labelTxt));

          if (isSingle) {
            // Valor único: solo mostrar el número, sin rango ni barra
            top.appendChild(h('span',{style:'font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:1.05rem;color:var(--green)'},effective.toFixed(1)));
            row.appendChild(top);
          } else {
            // Rango con barra y marcador
            const pctEff = Math.max(0, Math.min(100, ((effective - rMin) / (rMax - rMin)) * 100));
            const valsEl = h('div',{style:'display:flex;align-items:center;gap:8px'});
            valsEl.appendChild(h('span',{style:'font-size:.7rem;color:var(--muted2)'},rMin.toFixed(1)));
            valsEl.appendChild(h('span',{style:'font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:1.05rem;color:var(--green)'},effective.toFixed(1)));
            valsEl.appendChild(h('span',{style:'font-size:.7rem;color:var(--muted2)'},rMax.toFixed(1)));
            top.appendChild(valsEl);
            row.appendChild(top);
            const trackWrap = h('div',{style:'position:relative;height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin-top:5px'});
            trackWrap.appendChild(h('div',{style:`position:absolute;left:0;top:0;height:6px;width:${pctEff}%;background:var(--green);border-radius:3px`}));
            const dot = h('div',{style:`position:absolute;top:-3px;left:calc(${pctEff}% - 5px);width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg)`});
            trackWrap.appendChild(dot);
            row.appendChild(trackWrap);
          }

          adminAttrWrap.appendChild(row);
        });
        modal.appendChild(adminAttrWrap);
      } else {
        // Vista compacta para usuarios normales
        const attGrid = h('div',{style:'display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px'});
        attrs.forEach(a => {
          const v = attrEffective(player, a, tFactor);
          const pct = Math.round((v/10)*100);
          const cell = h('div',{style:'background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:8px 10px'});
          cell.appendChild(h('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px'},
            h('span',{style:'font-size:.72rem;color:var(--muted)'},attrLabels[a]),
            h('span',{style:'font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:.95rem'},v.toFixed(1))
          ));
          const track = h('div',{style:'height:4px;background:rgba(255,255,255,.08);border-radius:2px'});
          track.appendChild(h('div',{style:`height:4px;width:${pct}%;background:var(--green);border-radius:2px`}));
          cell.appendChild(track);
          attGrid.appendChild(cell);
        });
        modal.appendChild(attGrid);
      }
    }

    // ── Compañeros y Rivales (op.gg style) ──
    const mkPartnerSection = (list, label, isPartner) => {
      if (!list.length) return;
      modal.appendChild(h('div',{style:'font-size:.75rem;color:var(--muted2);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px'},label));
      const wrap = h('div',{style:'margin-bottom:16px'});
      list.slice(0,5).forEach((p, idx) => {
        const wr = p.win_rate;
        const barColor = wr>=60?'var(--green)':wr>=45?'var(--yellow)':'var(--red)';
        const textColor = wr>=60?'var(--green)':wr>=45?'var(--yellow)':'var(--red)';
        const row = h('div',{style:'display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)'});

        // Rank
        row.appendChild(h('span',{style:'font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:.9rem;color:var(--muted);min-width:16px'},`${idx+1}`));

        // Nombre
        const nameCol = h('div',{style:'flex:1;min-width:0'});
        nameCol.appendChild(h('div',{style:'font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'},p.name));
        nameCol.appendChild(h('div',{style:'font-size:.7rem;color:var(--muted)'},`${p.gp} partidos · ${p.wins}V ${p.draws}E ${p.losses}D`));
        row.appendChild(nameCol);

        // Barra win rate
        const barWrap = h('div',{style:'width:70px'});
        const track = h('div',{style:'height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:3px'});
        track.appendChild(h('div',{style:`height:4px;width:${wr}%;background:${barColor};border-radius:2px;transition:width .3s`}));
        barWrap.appendChild(track);
        barWrap.appendChild(h('div',{style:`font-family:"Barlow Condensed",sans-serif;font-size:.9rem;font-weight:900;color:${textColor};text-align:right`},`${wr}%`));
        row.appendChild(barWrap);

        wrap.appendChild(row);
      });
      modal.appendChild(wrap);
    };

    mkPartnerSection(partners.partners, '🤝 Mejores compañeros', true);
    mkPartnerSection(partners.rivals,   '⚔️ Rivales frecuentes', false);

    // ── Últimos partidos ──
    modal.appendChild(h('div',{style:'font-size:.75rem;color:var(--muted2);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px'},'Últimos partidos'));
    if (!history.length) {
      modal.appendChild(h('div',{class:'empty'},h('p',{},'Sin partidos jugados aún')));
    } else {
      history.slice(0,10).forEach(entry => {
        const resColor = entry.result==='W' ? 'var(--green)' : entry.result==='L' ? 'var(--red)' : 'var(--yellow)';
        const resLabel = entry.result==='W' ? 'Victoria' : entry.result==='L' ? 'Derrota' : 'Empate';
        const date = new Date(entry.played_at).toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});
        const rankTxt = entry.rank_pos ? `Rank #${entry.rank_pos} en su equipo` : '';
        const diffTxt = entry.goal_diff != null && entry.result !== 'D' ? `+${entry.goal_diff}` : (entry.result==='D'?'Empate':'');

        const row = h('div',{style:'display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)'});

        // Pill W/L/D
        row.appendChild(h('span',{style:`min-width:28px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:.88rem;background:${resColor}22;color:${resColor}`},entry.result));

        // Info
        const info = h('div',{style:'flex:1;min-width:0'});
        info.appendChild(h('div',{style:'font-size:.85rem;font-weight:600'},resLabel + (diffTxt ? ' · ' + diffTxt : '')));
        info.appendChild(h('div',{style:'font-size:.72rem;color:var(--muted)'},date + (rankTxt ? ' · ' + rankTxt : '')));
        row.appendChild(info);

        // Pts
        row.appendChild(h('span',{style:`font-family:"Barlow Condensed",sans-serif;font-size:1rem;font-weight:700;color:${entry.perf_score>0?'var(--green)':entry.perf_score<0?'var(--red)':'var(--muted)'}`},
          (entry.perf_score>0?'+':'')+entry.perf_score));

        modal.appendChild(row);
      });
    }
  } catch(e) {
    spinner.remove();
    modal.appendChild(h('div',{class:'empty'},h('p',{},'Error cargando datos')));
  }
}

// =========================================================
//  TAB: STATS
// =========================================================
async function renderStats(root) {
  const attrs = ['shot','passing','defense','vision','stamina','speed'];
  const attrLabels = { shot:'Disparo', passing:'Pase', defense:'Defensa', vision:'Visión', stamina:'Físico', speed:'Velocidad' };

  // --- sub-tabs ---
  let statsTab = 'ranking';
  const tabBar = h('div',{style:'display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border:1px solid var(--card-border);padding:4px;border-radius:14px;width:fit-content'});
  const mkTabBtn = (key, label) => {
    const btn = h('button',{style:'font-family:"Barlow Condensed",sans-serif;font-size:1rem;font-weight:700;padding:6px 18px;border-radius:10px;border:none;cursor:pointer;transition:all .18s'},label);
    const upd = () => { btn.style.background = statsTab===key ? 'var(--green)' : 'none'; btn.style.color = statsTab===key ? '#000' : 'var(--muted)'; };
    btn.onclick = () => { statsTab = key; renderSection(); updateTabs(); };
    tabBar.appendChild(btn);
    return upd;
  };
  const updRanking = mkTabBtn('ranking','📊 Ranking');
  const updTemporada = mkTabBtn('temporada','🏆 Temporada');
  const updateTabs = () => { updRanking(); updTemporada(); };
  updateTabs();
  root.appendChild(tabBar);

  const content = h('div',{});
  root.appendChild(content);

  let playersWithOp = [], trendsMap = {};

  async function renderSection() {
    content.innerHTML = '<div class="spinner" style="display:block;margin:20px auto"></div>';
    try {
      if (statsTab === 'ranking') await renderRanking();
      else await renderTemporada();
    } catch(e) {
      content.innerHTML = '';
      content.appendChild(h('div',{class:'card'},h('div',{class:'empty'},h('p',{},'Error: '+e.message))));
    }
  }

  // --- RANKING ---
  async function renderRanking() {
    const [pwop, trends] = await Promise.all([
      api('/players/with_opinions'),
      api('/players/trends?lookback=4'),
    ]);
    playersWithOp = pwop;
    trendsMap = Object.fromEntries(trends.map(t => [t.player_id, t]));
    const sorted = [...pwop].sort((a,b) => {
      const ta  = trendsMap[a.id]?.trend      || 'flat';
      const tla = trendsMap[a.id]?.long_trend || 'flat';
      const tb  = trendsMap[b.id]?.trend      || 'flat';
      const tlb = trendsMap[b.id]?.long_trend || 'flat';
      return ovrWithTrend(b, tb, tlb) - ovrWithTrend(a, ta, tla);
    });
    content.innerHTML = '';
    const card = h('div',{class:'card'});
    card.appendChild(h('div',{class:'card-title'},'📊 Ranking por nivel'));

    // Header cols
    const hdrRow = h('div',{style:'display:grid;grid-template-columns:28px 1fr 90px 48px;gap:6px;padding:4px 8px;font-size:.7rem;color:var(--muted);font-weight:700;border-bottom:1px solid var(--card-border);margin-bottom:4px'});
    ['#','Jugador','Atributos','OVR'].forEach((t,i) => {
      const d = h('div',{},t);
      if (i===2) d.style.textAlign='center';
      if (i===3) d.style.textAlign='right';
      hdrRow.appendChild(d);
    });
    card.appendChild(hdrRow);

    const wrap = h('div',{});
    sorted.forEach((p, idx) => {
      const t = trendsMap[p.id];
      const row = h('div',{style:'display:grid;grid-template-columns:28px 1fr 90px 48px;gap:6px;padding:8px;border-radius:8px;align-items:center;cursor:pointer;transition:background .15s'});
      row.onmouseenter = () => row.style.background = 'rgba(255,255,255,.04)';
      row.onmouseleave = () => row.style.background = '';
      row.onclick = () => openPlayerModal(p, trendsMap);

      // #
      row.appendChild(h('div',{style:'font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:.9rem;color:var(--muted);text-align:center'},`${idx+1}`));

      // Nombre + trend badges
      const trendKey     = t?.trend      || 'flat';
      const longTrendKey = t?.long_trend || 'flat';
      const nameCol = h('div',{style:'display:flex;align-items:center;gap:4px;min-width:0;flex-wrap:wrap'});
      nameCol.appendChild(h('span',{style:'font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'},p.name+(p.is_goalkeeper?' 🥅':'')));
      if (t) {
        nameCol.appendChild(h('span',{class:`badge ${TREND_CLS[trendKey]}`,title:'Racha corta (4 partidos)'},TREND_LABEL[trendKey]));
        if (longTrendKey !== 'flat') {
          nameCol.appendChild(h('span',{class:`badge ${TREND_CLS[longTrendKey]}`,style:'opacity:.65;font-size:.6rem',title:'Tendencia larga (8 partidos)'},LONG_TREND_LABEL[longTrendKey]));
        }
      }
      row.appendChild(nameCol);

      // Mini bars (6 atributos en pequeño)
      const factor = blendedFactor(trendKey, longTrendKey);
      const barsCol = h('div',{style:'display:flex;gap:2px;align-items:flex-end;height:20px'});
      attrs.forEach(a => {
        const v = attrEffective(p, a, factor);
        const pct = Math.round((v/10)*100);
        const bar = h('div',{style:`width:10px;height:${Math.max(3,Math.round(pct*0.18))}px;background:var(--green);border-radius:2px 2px 0 0;opacity:.8`,title:`${attrLabels[a]}: ${v.toFixed(1)}`});
        barsCol.appendChild(bar);
      });
      row.appendChild(barsCol);

      // OVR ajustado por racha corta + larga
      const adjOvr = ovrWithTrend(p, trendKey, longTrendKey);
      const ovrCell = h('div',{style:'text-align:right'});
      ovrCell.appendChild(h('div',{style:'font-family:"Barlow Condensed",sans-serif;font-size:1.2rem;font-weight:900;color:var(--green)'},adjOvr.toFixed(1)));
      row.appendChild(ovrCell);

      wrap.appendChild(row);
    });
    if (!sorted.length) wrap.appendChild(h('div',{class:'empty'},h('p',{},'No hay jugadores aún')));
    card.appendChild(wrap);
    content.appendChild(card);
  }

  // --- TEMPORADA ---
  async function renderTemporada() {
    content.innerHTML = '';
    const card = h('div',{class:'card'});
    card.appendChild(h('div',{class:'card-title'},'🏆 Tabla de temporada'));

    const currentYear = new Date().getFullYear();
    const years = [currentYear];

    let selYear = currentYear, dateFrom = '', dateTo = '';

    const filters = h('div',{style:'display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:flex-end'});

    // Year pills
    const yearWrap = h('div',{style:'display:flex;gap:4px;flex-wrap:wrap'});
    const yearBtns = {};
    years.forEach(y => {
      const btn = h('button',{style:'padding:4px 12px;border-radius:20px;border:1px solid var(--card-border);background:none;color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .15s'},String(y));
      btn.onclick = () => { selYear = y; dateFrom=''; dateTo=''; fromInp.value=''; toInp.value=''; updateYearBtns(); loadTable(); };
      yearBtns[y] = btn;
      yearWrap.appendChild(btn);
    });
    const updateYearBtns = () => {
      Object.entries(yearBtns).forEach(([y, btn]) => {
        btn.style.background = Number(y)===selYear && !dateFrom && !dateTo ? 'var(--green)' : 'none';
        btn.style.color = Number(y)===selYear && !dateFrom && !dateTo ? '#000' : 'var(--muted)';
        btn.style.borderColor = Number(y)===selYear && !dateFrom && !dateTo ? 'var(--green)' : 'var(--card-border)';
      });
    };
    updateYearBtns();
    filters.appendChild(h('div',{},h('div',{style:'font-size:.75rem;color:var(--muted);margin-bottom:4px'},'Año'),yearWrap));

    // Date range
    const fromInp = h('input',{type:'date',style:'background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:5px 10px;color:var(--text);font-size:.85rem'});
    const toInp = h('input',{type:'date',style:'background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:5px 10px;color:var(--text);font-size:.85rem'});
    fromInp.oninput = () => { dateFrom=fromInp.value; if(dateFrom||dateTo){ selYear=0; updateYearBtns(); } loadTable(); };
    toInp.oninput = () => { dateTo=toInp.value; if(dateFrom||dateTo){ selYear=0; updateYearBtns(); } loadTable(); };
    filters.appendChild(h('div',{},h('div',{style:'font-size:.75rem;color:var(--muted);margin-bottom:4px'},'Desde'),fromInp));
    filters.appendChild(h('div',{},h('div',{style:'font-size:.75rem;color:var(--muted);margin-bottom:4px'},'Hasta'),toInp));
    card.appendChild(filters);

    const tableWrap = h('div',{});
    card.appendChild(tableWrap);

    async function loadTable() {
      tableWrap.innerHTML = '<div class="spinner" style="display:block;margin:16px auto"></div>';
      let url = '/stats/season?';
      if (selYear) url += `year=${selYear}&`;
      if (dateFrom) url += `date_from=${dateFrom}&`;
      if (dateTo) url += `date_to=${dateTo}&`;
      const stats = await api(url);
      tableWrap.innerHTML = '';
      if (!stats.length) { tableWrap.appendChild(h('div',{class:'empty'},h('p',{},'Sin partidos en este período'))); return; }

      // Header
      const hdrRow = h('div',{style:'display:grid;grid-template-columns:28px 1fr 40px 40px 40px 40px 60px 60px;gap:6px;padding:6px 0;font-size:.7rem;color:var(--muted);font-weight:700;border-bottom:1px solid var(--card-border);margin-bottom:4px'});
      ['#','Jugador','PJ','G','E','P','Pts','%V'].forEach(t => hdrRow.appendChild(h('div',{style:'text-align:center'},t)));
      hdrRow.children[1].style.textAlign = 'left';
      tableWrap.appendChild(hdrRow);

      stats.forEach((s, idx) => {
        const row = h('div',{style:'display:grid;grid-template-columns:28px 1fr 40px 40px 40px 40px 60px 60px;gap:6px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;cursor:pointer'});
        row.onmouseenter = () => row.style.background = 'rgba(255,255,255,.03)';
        row.onmouseleave = () => row.style.background = '';
        const pl = playersWithOp.find(p=>p.id===s.player_id) || {id:s.player_id,name:s.name,is_goalkeeper:false,combined:{},admin:{}};
        row.onclick = () => openPlayerModal(pl, trendsMap);
        const cells = [
          h('div',{style:'text-align:center;font-size:.8rem;color:var(--muted)'},`${idx+1}`),
          h('div',{style:'font-weight:600;font-size:.9rem'},s.name),
          h('div',{style:'text-align:center'},`${s.gp}`),
          h('div',{style:'text-align:center;color:var(--green)'},`${s.wins}`),
          h('div',{style:'text-align:center;color:var(--yellow)'},`${s.draws}`),
          h('div',{style:'text-align:center;color:var(--red)'},`${s.losses}`),
          h('div',{style:`text-align:center;font-family:"Barlow Condensed",sans-serif;font-size:1.1rem;font-weight:900;color:${s.perf_points>=0?'var(--green)':'var(--red)'}`},(s.perf_points>0?'+':'')+s.perf_points),
          h('div',{style:`text-align:center;color:${s.win_rate>=50?'var(--green)':'var(--red)'}`},s.win_rate+'%'),
        ];
        cells.forEach(c => row.appendChild(c));
        tableWrap.appendChild(row);
      });
    }

    await loadTable();
    content.appendChild(card);

    // Load players data for modal
    if (!playersWithOp.length) {
      const [pwop, trends] = await Promise.all([api('/players/with_opinions'), api('/players/trends?lookback=4')]);
      playersWithOp = pwop;
      trendsMap = Object.fromEntries(trends.map(t => [t.player_id, t]));
    }
  }

  await renderSection();
}

// =========================================================
function renderAdmin(root) {
  if (!state.adminOk) {
    const card = h('div', { class:'card', style:'max-width:400px;margin:0 auto' });
    card.appendChild(h('div',{class:'card-title'},'🔧 Panel de Admin'));
    card.appendChild(h('p',{style:'color:var(--muted2);font-size:.9rem;margin-bottom:16px'},'Ingresá el PIN para acceder.'));
    const inp = h('input',{type:'password',placeholder:'PIN de admin'});
    card.appendChild(h('div',{class:'field'},inp));

    // URL del backend
    const urlInp = h('input',{type:'text',placeholder:'URL del backend (ej: https://mi-app.up.railway.app)',value:localStorage.getItem('apiUrl')||''});
    card.appendChild(h('div',{class:'field'},h('label',{},'URL del backend'),urlInp));

    const loginBtn = h('button',{class:'btn btn-green',onClick:async()=>{
      if (!inp.value) return;
      if (urlInp.value) localStorage.setItem('apiUrl', urlInp.value.trim());
      loginBtn.disabled = true; loginBtn.textContent = '...';
      try {
        await api('/admin/verify', { method:'POST', headers:{'Content-Type':'application/json','X-Admin-Pin':inp.value} });
        state.adminOk = true;
        state.adminPin = inp.value;
        localStorage.setItem('adminOk','1');
        toast('Acceso de admin ✓');
        renderContent();
      } catch(e) {
        toast('PIN incorrecto','err');
        loginBtn.disabled = false; loginBtn.textContent = 'Ingresar';
      }
    }}, 'Ingresar');
    card.appendChild(loginBtn);
    root.appendChild(card);
    return;
  }

  const adminBar = h('div',{class:'admin-bar'},
    h('span',{},'⚡ Modo administrador'),
    h('button',{class:'btn btn-ghost btn-sm',onClick:()=>{
      state.adminOk=false; localStorage.removeItem('adminOk'); renderContent();
    }},'Salir de admin')
  );
  root.appendChild(adminBar);

  // Sub-tabs
  let adminTab = 'jugadores';
  const tabBar = h('div',{style:'display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border:1px solid var(--card-border);padding:4px;border-radius:14px;width:fit-content;flex-wrap:wrap'});
  const adminTabs = [['jugadores','👥 Jugadores'],['participacion','📋 Participación'],['usuarios','👤 Usuarios'],['config','⚙️ Config']];
  const tabBtns = {};
  const tabContent = h('div',{});
  root.appendChild(tabBar);
  root.appendChild(tabContent);

  const setAdminTab = (t) => {
    adminTab = t;
    adminTabs.forEach(([key]) => {
      const b = tabBtns[key];
      b.style.background = key===t ? 'var(--green)' : 'none';
      b.style.color = key===t ? '#000' : 'var(--muted)';
    });
    tabContent.innerHTML = '';
    if (t === 'jugadores') renderPlayerAdmin(tabContent);
    else if (t === 'participacion') renderParticipacion(tabContent);
    else if (t === 'usuarios') renderUsuarios(tabContent);
    else if (t === 'config') renderAdminConfig(tabContent);
  };

  adminTabs.forEach(([key, label]) => {
    const btn = h('button',{style:'font-family:"Barlow Condensed",sans-serif;font-size:1rem;font-weight:700;padding:6px 16px;border-radius:10px;border:none;cursor:pointer;transition:all .18s;background:none;color:var(--muted)'},label);
    btn.onclick = () => setAdminTab(key);
    tabBtns[key] = btn;
    tabBar.appendChild(btn);
  });
  setAdminTab('jugadores');
}

// ── PARTICIPACIÓN ──────────────────────────────────────
async function renderParticipacion(root) {
  const card = h('div',{class:'card'});
  card.appendChild(h('div',{class:'card-title'},'📋 Estado de participación'));
  const wrap = h('div',{});
  card.appendChild(wrap);
  root.appendChild(card);

  wrap.innerHTML = '<div class="spinner" style="display:block;margin:20px auto"></div>';
  try {
    const data = await api('/admin/participation');
    wrap.innerHTML = '';

    // Summary pills
    const total = data.length;
    const selfDone = data.filter(p=>p.self_eval).length;
    const fullDone = data.filter(p=>p.evals_given===p.total_to_give && p.self_eval).length;
    const summRow = h('div',{style:'display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px'});
    const mkPill = (val, lbl, color) => h('div',{style:`background:${color}22;border:1px solid ${color};border-radius:10px;padding:8px 14px;text-align:center`},
      h('div',{style:`font-family:"Barlow Condensed",sans-serif;font-size:1.4rem;font-weight:900;color:${color}`},String(val)),
      h('div',{style:'font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px'},lbl)
    );
    summRow.appendChild(mkPill(total, 'Jugadores', 'var(--muted2)'));
    summRow.appendChild(mkPill(selfDone+'/'+total, 'Autoevaluados', 'var(--blue)'));
    summRow.appendChild(mkPill(fullDone+'/'+total, 'Completos', 'var(--green)'));
    wrap.appendChild(summRow);

    // Table header
    const hdr = h('div',{style:'display:grid;grid-template-columns:1fr 60px 80px 80px 80px;gap:6px;padding:6px 8px;font-size:.7rem;color:var(--muted);font-weight:700;border-bottom:1px solid var(--card-border);margin-bottom:4px'});
    ['Jugador','Auto','Dio','Recibió','Estado'].forEach(t => hdr.appendChild(h('div',{style:'text-align:center'},t)));
    hdr.firstChild.style.textAlign = 'left';
    wrap.appendChild(hdr);

    data.forEach(p => {
      const complete = p.self_eval && p.evals_given === p.total_to_give;
      const partial = p.self_eval || p.evals_given > 0;
      const statusColor = complete ? 'var(--green)' : partial ? 'var(--yellow)' : 'var(--red)';
      const statusLabel = complete ? '✓ Completo' : partial ? '⚠ Parcial' : '✗ Sin iniciar';

      const row = h('div',{style:'display:grid;grid-template-columns:1fr 60px 80px 80px 80px;gap:6px;padding:7px 8px;border-radius:8px;align-items:center;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s'});
      row.onmouseenter = () => row.style.background = 'rgba(255,255,255,.04)';
      row.onmouseleave = () => row.style.background = '';
      row.onclick = () => openParticipacionModal(p, data);

      // Nombre
      const nameCol = h('div',{style:'display:flex;align-items:center;gap:6px'});
      nameCol.appendChild(h('span',{style:'font-weight:600;font-size:.88rem'},p.name+(p.is_goalkeeper?' 🥅':'')));
      if (p.has_password) nameCol.appendChild(h('span',{style:'font-size:.65rem;color:var(--muted)'},'🔒'));
      row.appendChild(nameCol);

      // Auto-eval
      row.appendChild(h('div',{style:'text-align:center;font-size:1rem'}, p.self_eval ? '✅' : '❌'));

      // Opiniones dadas
      const giveColor = p.evals_given===p.total_to_give?'var(--green)':p.evals_given>0?'var(--yellow)':'var(--red)';
      row.appendChild(h('div',{style:`text-align:center;font-family:"Barlow Condensed",sans-serif;font-weight:700;color:${giveColor}`},`${p.evals_given}/${p.total_to_give}`));

      // Opiniones recibidas
      row.appendChild(h('div',{style:'text-align:center;font-family:"Barlow Condensed",sans-serif;font-weight:700;color:var(--muted2)'},`${p.evals_received}/${p.total_to_give}`));

      // Estado
      row.appendChild(h('div',{style:`text-align:center;font-size:.75rem;font-weight:700;color:${statusColor}`},statusLabel));

      wrap.appendChild(row);
    });
    // ── Matriz de opiniones ──
    const matCard = h('div',{class:'card',style:'margin-top:16px;overflow-x:auto'});
    matCard.appendChild(h('div',{class:'card-title'},'🔲 Matriz de opiniones'));
    matCard.appendChild(h('div',{style:'font-size:.75rem;color:var(--muted);margin-bottom:12px'},'Fila = quién opina · Columna = sobre quién · — = autoevaluación'));

    const cellSz = '28px';
    const table = h('div',{style:'display:inline-block;min-width:100%'});

    // Header row (columnas = targets)
    const headerRow = h('div',{style:'display:flex;align-items:flex-end;margin-bottom:2px'});
    headerRow.appendChild(h('div',{style:`min-width:110px`})); // spacer
    data.forEach(target => {
      const lbl = h('div',{style:`width:${cellSz};writing-mode:vertical-rl;transform:rotate(180deg);font-size:.65rem;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-height:80px;text-align:left;cursor:default`,title:target.name},
        target.name.split(' ')[0]);
      headerRow.appendChild(lbl);
    });
    table.appendChild(headerRow);

    // Data rows (filas = actors)
    data.forEach(actor => {
      const row = h('div',{style:'display:flex;align-items:center;margin-bottom:2px'});
      // Nombre del actor
      row.appendChild(h('div',{style:`min-width:110px;font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px`,title:actor.name},
        actor.name));
      // Celdas
      data.forEach(target => {
        let bg, title;
        if (actor.id === target.id) {
          // Diagonal: autoevaluación
          bg = actor.self_eval ? 'rgba(59,130,246,.5)' : 'rgba(239,68,68,.25)';
          title = actor.self_eval ? 'Se autoevaluó' : 'Sin autoevaluar';
        } else {
          const gave = !actor.missing_evals.includes(target.name);
          bg = gave ? 'rgba(34,197,94,.4)' : 'rgba(239,68,68,.15)';
          title = gave ? `${actor.name} opinó sobre ${target.name}` : `${actor.name} NO opinó sobre ${target.name}`;
        }
        const cell = h('div',{
          style:`width:${cellSz};height:${cellSz};border-radius:4px;background:${bg};margin-right:2px;cursor:default;transition:transform .1s;flex-shrink:0`,
          title
        });
        cell.onmouseenter = () => cell.style.transform = 'scale(1.3)';
        cell.onmouseleave = () => cell.style.transform = '';
        row.appendChild(cell);
      });
      table.appendChild(row);
    });

    // Leyenda
    const legend = h('div',{style:'display:flex;gap:14px;margin-top:12px;flex-wrap:wrap'});
    [
      ['rgba(34,197,94,.4)','Opinó'],
      ['rgba(239,68,68,.15)','No opinó'],
      ['rgba(59,130,246,.5)','Autoevaluado'],
      ['rgba(239,68,68,.25)','Sin autoevaluar'],
    ].forEach(([color, lbl]) => {
      legend.appendChild(h('div',{style:'display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted2)'},
        h('div',{style:`width:12px;height:12px;border-radius:3px;background:${color};flex-shrink:0`}),
        h('span',{},lbl)
      ));
    });

    matCard.appendChild(table);
    matCard.appendChild(legend);
    root.appendChild(matCard);

  } catch(e) {
    wrap.innerHTML = '';
    wrap.appendChild(h('div',{class:'empty'},h('p',{},'Error cargando datos: '+e.message)));
  }
}

async function openParticipacionModal(p, allData) {
  const overlay = h('div',{class:'overlay',onClick:e=>{if(e.target===overlay)overlay.remove();}});
  const modal = h('div',{class:'modal',style:'max-width:480px'});
  modal.appendChild(h('div',{class:'modal-title'},
    h('span',{},p.name+(p.is_goalkeeper?' 🥅':'')),
    h('button',{class:'close-btn',onClick:()=>overlay.remove()},'×')
  ));

  // Admin: botón para ingresar como este jugador
  if (state.adminOk) {
    modal.appendChild(h('button',{class:'btn btn-sm',style:'width:100%;margin-bottom:14px',onClick:async()=>{
      try {
        const allUsers = await api('/users');
        let user = allUsers.find(u => u.player_id === p.id);
        if (!user) {
          user = await api('/users',{method:'POST',body:JSON.stringify({name:p.name,is_admin:false,player_id:p.id})});
        }
        state.me = user;
        localStorage.setItem('me', JSON.stringify(user));
        overlay.remove();
        setTab('jugar');
        toast(`Ingresado como ${p.name} ✓`);
      } catch(e) { toast('Error: '+e.message,'err'); }
    }},`🔑 Ingresar como ${p.name}`));
  }

  // Estado general
  const complete = p.self_eval && p.evals_given===p.total_to_give;
  const statusColor = complete?'var(--green)':p.evals_given>0||p.self_eval?'var(--yellow)':'var(--red)';
  const statusLabel = complete?'✓ Participación completa':p.evals_given>0||p.self_eval?'⚠ Participación incompleta':'✗ Sin participar';
  modal.appendChild(h('div',{style:`font-size:.85rem;font-weight:700;color:${statusColor};margin-bottom:16px`},statusLabel));

  // Admin: cargar valores reales de las opiniones del jugador
  const attrs = ['shot','passing','defense','vision','stamina','speed'];
  const attrLabels = {shot:'Dis',passing:'Pase',defense:'Def',vision:'Vis',stamina:'Fís',speed:'Vel'};
  let opsByTarget = {};
  if (state.adminOk) {
    try {
      const allUsers = await api('/users');
      const user = allUsers.find(u => u.player_id === p.id);
      if (user) {
        const ops = await api(`/opinions?actor_user_id=${user.id}`);
        ops.forEach(o => { opsByTarget[o.target_player_id] = o; });
      }
    } catch(e) {}
  }

  const mkVals = (op) => {
    const grid = h('div',{style:'display:grid;grid-template-columns:repeat(3,1fr);gap:2px 8px;margin-top:5px'});
    attrs.forEach(a => {
      grid.appendChild(h('div',{style:'font-size:.7rem'},
        h('span',{style:'color:var(--muted)'},attrLabels[a]+': '),
        h('span',{style:'color:var(--green);font-weight:700'},`${op[a+'_min']}–${op[a+'_max']}`)
      ));
    });
    return grid;
  };

  // Autoevaluación
  modal.appendChild(h('div',{style:'font-size:.75rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px'},'Autoevaluación'));
  const selfBox = h('div',{style:'padding:8px 10px;border-radius:8px;background:var(--bg3);margin-bottom:14px'});
  selfBox.appendChild(h('div',{style:'display:flex;align-items:center;gap:8px;font-size:.9rem'},
    h('span',{style:'font-size:1.1rem'},p.self_eval?'✅':'❌'),
    h('span',{},p.self_eval?'Se autoevaluó':'Todavía no se autoevaluó')
  ));
  const selfOp = opsByTarget[p.id];
  if (selfOp) selfBox.appendChild(mkVals(selfOp));
  modal.appendChild(selfBox);

  // Opiniones que dio
  modal.appendChild(h('div',{style:'font-size:.75rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px'},
    `Opiniones sobre otros — ${p.evals_given}/${p.total_to_give}`));
  const others = allData.filter(x=>x.id!==p.id);
  others.forEach(other => {
    const gave = !p.missing_evals.includes(other.name);
    const op = opsByTarget[other.id];
    const row = h('div',{style:'padding:6px 10px;border-radius:8px;margin-bottom:4px;background:var(--bg3)'});
    const topRow = h('div',{style:'display:flex;align-items:center;justify-content:space-between'});
    topRow.appendChild(h('span',{style:'font-size:.88rem'},other.name+(other.is_goalkeeper?' 🥅':'')));
    topRow.appendChild(h('span',{style:`font-size:.9rem;font-weight:700;color:${gave?'var(--green)':'var(--red)'}`},gave?'✓ Opinó':'✗ Pendiente'));
    row.appendChild(topRow);
    if (op) row.appendChild(mkVals(op));
    modal.appendChild(row);
  });

  // Quiénes no opinaron sobre él
  const notReceived = allData.filter(x=>x.id!==p.id && x.missing_evals.includes(p.name));
  if (notReceived.length) {
    modal.appendChild(h('div',{style:'font-size:.75rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px'},
      `Pendiente de opinar sobre ${p.name.split(' ')[0]} (${notReceived.length})`));
    notReceived.forEach(other => {
      modal.appendChild(h('div',{style:'padding:6px 10px;border-radius:8px;margin-bottom:4px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);font-size:.88rem;color:var(--muted2)'},
        `✗ ${other.name}`));
    });
  }

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

// ── USUARIOS ───────────────────────────────────────────
async function renderUsuarios(root) {
  const card = h('div',{class:'card'});
  card.appendChild(h('div',{class:'card-title'},'👤 Actividad de jugadores'));
  const wrap = h('div',{});
  card.appendChild(wrap);
  root.appendChild(card);

  wrap.innerHTML = '<div class="spinner" style="display:block;margin:20px auto"></div>';
  try {
    const data = await api('/admin/participation');
    wrap.innerHTML = '';

    const hdr = h('div',{style:'display:grid;grid-template-columns:1fr 100px 140px 60px;gap:6px;padding:6px 8px;font-size:.7rem;color:var(--muted);font-weight:700;border-bottom:1px solid var(--card-border);margin-bottom:4px'});
    ['Jugador','Registrado','Último acceso','PW'].forEach(t => hdr.appendChild(h('div',{style:'text-align:center'},t)));
    hdr.firstChild.style.textAlign = 'left';
    wrap.appendChild(hdr);

    const sorted = [...data].sort((a,b) => {
      if (!a.last_login && !b.last_login) return 0;
      if (!a.last_login) return 1;
      if (!b.last_login) return -1;
      return new Date(b.last_login) - new Date(a.last_login);
    });

    const fmtDate = iso => {
      if (!iso) return '—';
      const d = new Date(iso);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'Hace un momento';
      if (diff < 3600) return `Hace ${Math.floor(diff/60)} min`;
      if (diff < 86400) return `Hace ${Math.floor(diff/3600)} hs`;
      return d.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});
    };

    sorted.forEach(p => {
      const row = h('div',{style:'display:grid;grid-template-columns:1fr 100px 140px 60px;gap:6px;padding:7px 8px;border-radius:8px;align-items:center;border-bottom:1px solid rgba(255,255,255,.04)'});

      row.appendChild(h('div',{style:'font-weight:600;font-size:.88rem'},p.name+(p.is_goalkeeper?' 🥅':'')));
      row.appendChild(h('div',{style:'text-align:center;font-size:.75rem;color:var(--muted)'},fmtDate(p.created_at)));

      const loginColor = !p.last_login ? 'var(--red)' : 'var(--muted2)';
      row.appendChild(h('div',{style:`text-align:center;font-size:.75rem;color:${loginColor}`},fmtDate(p.last_login)));
      row.appendChild(h('div',{style:'text-align:center;font-size:.9rem'},p.has_password?'🔒':'🔓'));

      wrap.appendChild(row);
    });
  } catch(e) {
    wrap.innerHTML = '';
    wrap.appendChild(h('div',{class:'empty'},h('p',{},'Error: '+e.message)));
  }
}

// ── CONFIG ─────────────────────────────────────────────
function renderAdminConfig(root) {
  const card = h('div',{class:'card'});
  card.appendChild(h('div',{class:'card-title'},'⚙️ Configuración'));
  card.appendChild(h('p',{style:'font-size:.82rem;color:var(--muted);margin-bottom:12px'},`Backend actual: ${API}`));
  const urlInp = h('input',{type:'text',placeholder:`URL del backend (default: ${BACKEND_URL})`,value:localStorage.getItem('apiUrl')||''});
  card.appendChild(h('div',{class:'field'},h('label',{},'Sobreescribir URL del backend'),urlInp));
  card.appendChild(h('button',{class:'btn btn-ghost btn-sm',onClick:()=>{
    const v = urlInp.value.trim();
    if(v) localStorage.setItem('apiUrl', v); else localStorage.removeItem('apiUrl');
    toast('Configuración guardada. Recargando...'); setTimeout(()=>location.reload(),800);
  }},'Guardar'));
  root.appendChild(card);
}

function renderPlayerAdmin(root) {
  const card = h('div', { class:'card' });
  card.appendChild(h('div',{class:'card-title'},'👥 Gestión de jugadores'));

  const listWrap = h('div',{style:'margin-bottom:16px'});
  card.appendChild(listWrap);

  const attrs = ['shot','passing','defense','vision','stamina','speed'];
  const attrLabels = { shot:'Disparo', passing:'Pase', defense:'Defensa', vision:'Visión', stamina:'Físico', speed:'Vel' };
  let editing = null;

  const loadList = () => {
    listWrap.innerHTML = '';
    if (!state.players.length) {
      listWrap.appendChild(h('div',{class:'empty'},h('p',{},'No hay jugadores')));
      return;
    }
    state.players.forEach(p => {
      const row = h('div',{class:'player-chip',style:'margin-bottom:6px'});
      const left2 = h('div',{style:'display:flex;align-items:center;gap:8px;flex:1'});
      left2.appendChild(h('span',{class:'player-name'},p.name));
      if(p.is_goalkeeper) left2.appendChild(h('span',{class:'badge badge-gk'},'GK'));
      left2.appendChild(h('span',{style:'color:var(--muted);font-size:.8rem'},`OVR: ${ovr(p)}`));
      row.appendChild(left2);
      const btns = h('div',{style:'display:flex;gap:6px'});
      btns.appendChild(h('button',{class:'btn btn-ghost btn-sm',onClick:()=>{ editing=p; renderForm(); toast('Editando: '+p.name); }}, '✏️'));
      btns.appendChild(h('button',{class:'btn btn-ghost btn-sm',title:'Blanquear contraseña',onClick:async()=>{
        let pin = state.adminPin;
        if (!pin) pin = prompt('PIN de admin para blanquear contraseña:');
        if (!pin) return;
        if (!confirm(`¿Blanquear contraseña de ${p.name}? El jugador podrá ingresar sin contraseña.`)) return;
        try {
          await api(`/players/${p.id}/reset_password`,{method:'POST'});
          state.adminPin = pin;
          toast(`Contraseña de ${p.name} blanqueada ✓`);
        } catch(e){ toast('Error: '+e.message,'err'); }
      }},'🔑'));
      btns.appendChild(h('button',{class:'btn btn-red btn-sm',onClick:async()=>{
        if(!confirm(`¿Eliminar a ${p.name}?`)) return;
        try { await api(`/players/${p.id}`,{method:'DELETE'}); await loadAll(); loadList(); toast(`${p.name} eliminado`); }
        catch(e){ toast('Error: '+e.message,'err'); }
      }},'🗑'));
      row.appendChild(btns);
      listWrap.appendChild(row);
    });
  };

  // Form
  const formCard = h('div',{class:'card',style:'background:var(--bg3)'});
  card.appendChild(formCard);

  const renderForm = () => {
    formCard.innerHTML = '';
    const p = editing;
    formCard.appendChild(h('div',{class:'card-title',style:'margin-bottom:12px'},p?`✏️ Editar: ${p.name}`:'➕ Nuevo jugador'));

    const vals = {};
    attrs.forEach(a => { vals[a] = [p?p[`${a}_min`]:4, p?p[`${a}_max`]:6]; });

    const nameInp = h('input',{type:'text',placeholder:'Nombre del jugador',value:p?.name||''});
    formCard.appendChild(h('div',{class:'field'},h('label',{},'Nombre'),nameInp));

    const gkCb = h('input',{type:'checkbox'}); gkCb.checked = p?.is_goalkeeper||false;
    formCard.appendChild(h('div',{class:'field'},h('label',{class:'check-row'},gkCb,'Es arquero')));

    formCard.appendChild(h('div',{style:'font-size:.8rem;color:var(--muted2);margin:10px 0 6px'},'Atributos (rango min–max, visión valor único):'));
    attrs.forEach(a => {
      if (a === 'vision') {
        const valLbl = h('span',{style:'color:var(--green);font-weight:700'},`${vals[a][0]}`);
        const lbl = h('div',{style:'display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted2);margin-bottom:3px'},
          h('span',{},attrLabels[a] + ' 👁️'), valLbl
        );
        formCard.appendChild(h('div',{style:'margin-bottom:8px'}, lbl,
          mkRangeSingle(vals[a][0], valLbl, v => { vals[a]=[v,v]; })
        ));
      } else {
        const valLbl = h('span',{style:'color:var(--green);font-weight:700'},`${vals[a][0]}–${vals[a][1]}`);
        const lbl = h('div',{style:'display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted2);margin-bottom:3px'},
          h('span',{},attrLabels[a]), valLbl
        );
        formCard.appendChild(h('div',{style:'margin-bottom:8px'}, lbl,
          mkRangeDouble(vals[a][0], vals[a][1], valLbl, (mn, mx) => { vals[a]=[mn,mx]; })
        ));
      }
    });

    const btnRow = h('div',{style:'display:flex;gap:8px;margin-top:12px;flex-wrap:wrap'});
    const saveBtn = h('button',{class:'btn btn-green',onClick:async()=>{
      const body = {
        name: nameInp.value.trim(), is_goalkeeper: gkCb.checked,
        ...Object.fromEntries(attrs.flatMap(a=>[[ `${a}_min`,vals[a][0]],[`${a}_max`,vals[a][1]]]))
      };
      if (!body.name) { toast('Ingresá un nombre','err'); return; }
      try {
        if (p) { await api(`/players/${p.id}`,{method:'PUT',body:JSON.stringify(body)}); toast(`${body.name} actualizado ✓`); }
        else { await api('/players',{method:'POST',body:JSON.stringify(body)}); toast(`${body.name} creado ✓`); }
        await loadAll(); loadList();
        editing = null; renderForm();
      } catch(e){ toast('Error: '+e.message,'err'); }
    }},p?'Actualizar':'Crear jugador');
    btnRow.appendChild(saveBtn);
    if (p) btnRow.appendChild(h('button',{class:'btn btn-ghost',onClick:()=>{ editing=null; renderForm(); }},'Cancelar'));
    formCard.appendChild(btnRow);
  };

  renderForm();
  loadList();
  root.appendChild(card);
}

// =========================================================
//  INIT
// =========================================================
async function init() {
  await loadAll();
  renderContent();
}
init();
</script>
