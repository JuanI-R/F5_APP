<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fútbol 5 — Armador de Equipos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --green: #22c55e;
    --green2: #16a34a;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f1f5f9;
    --muted: #64748b;
    --muted2: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -20%, rgba(34,197,94,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
  }

  /* LAYOUT */
  #app { max-width: 1100px; margin: 0 auto; padding: 0 16px 60px; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 24px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 44px; height: 44px; background: var(--green); border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    box-shadow: 0 0 24px rgba(34,197,94,0.4);
  }
  .logo h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.9rem; font-weight: 900; letter-spacing: 0.5px; line-height: 1; }
  .logo h1 span { color: var(--green); }
  .logo p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

  /* SESSION */
  .session-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .session-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--card-border);
    border-radius: 50px; padding: 6px 14px; font-size: 0.82rem;
  }
  .session-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* TABS */
  nav.tabs {
    display: flex; gap: 4px; margin-bottom: 24px;
    background: var(--bg2); border: 1px solid var(--card-border);
    padding: 4px; border-radius: 14px; width: fit-content;
  }
  nav.tabs button {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.5px;
    padding: 8px 20px; border-radius: 10px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    transition: all .18s;
  }
  nav.tabs button.active { background: var(--green); color: #000; }
  nav.tabs button:hover:not(.active) { color: var(--text); }

  /* CARDS */
  .card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--green); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* GRID */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:700px) { .grid2 { grid-template-columns: 1fr; } }
  .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  @media(max-width:600px) { .grid3 { grid-template-columns: 1fr 1fr; } }

  /* BUTTONS */
  .btn {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 1rem; letter-spacing: 0.5px; text-transform: uppercase;
    padding: 10px 22px; border-radius: 10px; border: none; cursor: pointer;
    transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-green { background: var(--green); color: #000; }
  .btn-green:hover { background: var(--green2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
  .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--card-border); }
  .btn-ghost:hover { border-color: var(--green); color: var(--green); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-red:hover { background: rgba(239,68,68,0.25); }
  .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* INPUTS */
  input[type=text], input[type=number], select, textarea {
    background: var(--bg2); border: 1px solid var(--card-border);
    color: var(--text); padding: 9px 12px; border-radius: 8px;
    font-family: 'Barlow', sans-serif; font-size: 0.9rem;
    outline: none; transition: border .15s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--green); }
  label { font-size: 0.8rem; color: var(--muted2); display: block; margin-bottom: 4px; }
  .field { margin-bottom: 12px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  /* RANGE SLIDER */
  .range-wrap { display: flex; align-items: center; gap: 10px; }
  .range-val { background: var(--bg3); padding: 3px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; min-width: 54px; text-align: center; color: var(--green); }
  input[type=range] {
    -webkit-appearance: none; flex: 1; height: 4px;
    background: var(--bg3); border-radius: 4px; border: none; padding: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; background: var(--green);
    border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(34,197,94,0.5);
  }

  /* PLAYER CARDS */
  .player-chip {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg3); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 8px 12px; gap: 8px;
    transition: border .15s;
  }
  .player-chip:hover { border-color: rgba(255,255,255,0.18); }
  .player-chip.selected { border-color: var(--green); background: rgba(34,197,94,0.08); }
  .player-chip.gk { border-left: 3px solid var(--yellow); }
  .player-name { font-weight: 600; font-size: 0.95rem; }
  .player-ovr {
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700;
    color: var(--green); min-width: 36px; text-align: right;
  }
  .badge {
    font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-gk { background: rgba(234,179,8,0.2); color: var(--yellow); }
  .badge-up { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-down { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-flat { background: rgba(100,116,139,0.2); color: var(--muted2); }

  /* TEAM DISPLAY */
  .team-box {
    background: var(--bg2); border: 1px solid var(--card-border);
    border-radius: 12px; overflow: hidden;
  }
  .team-header {
    padding: 10px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .team-header.a { background: rgba(59,130,246,0.15); border-bottom: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
  .team-header.b { background: rgba(239,68,68,0.12); border-bottom: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
  .team-header .score-big {
    font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900;
  }
  .team-list { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .team-player { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; font-size: 0.9rem; }
  .team-player:hover { background: rgba(255,255,255,0.04); }
  .rank-num { width: 20px; font-size: 0.75rem; color: var(--muted); }

  /* STATS BAR */
  .stat-bar { margin-bottom: 10px; }
  .stat-bar-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted2); margin-bottom: 3px; }
  .stat-bar-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; }

  /* MATCH CARD */
  .match-card {
    background: var(--bg3); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  }
  .match-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem; font-weight: 900; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .match-score .divider { color: var(--muted); font-size: 1.5rem; }

  /* SYNERGY SELECTOR */
  .syn-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--card-border); }
  .syn-row:last-child { border: none; }
  .syn-sel { display: flex; gap: 4px; }
  .syn-btn {
    width: 32px; height: 28px; border-radius: 6px; border: 1px solid var(--card-border);
    background: var(--bg2); cursor: pointer; font-size: 0.8rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; transition: all .12s;
    color: var(--muted2);
  }
  .syn-btn.active-p2 { background: rgba(34,197,94,0.3); border-color: var(--green); color: var(--green); }
  .syn-btn.active-p1 { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
  .syn-btn.active-0  { background: var(--bg3); border-color: var(--muted); color: var(--muted2); }
  .syn-btn.active-m1 { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
  .syn-btn.active-m2 { background: rgba(239,68,68,0.3); border-color: var(--red); color: var(--red); }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 16px;
    backdrop-filter: blur(4px);
    animation: fadeIn .15s;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 28px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
    animation: slideUp .2s;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 900;
    margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
  }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; line-height: 1; }
  .close-btn:hover { color: var(--text); }

  /* ADMIN PANEL LINK */
  .admin-link {
    font-size: 0.78rem; color: var(--muted); padding: 5px 10px;
    border: 1px solid var(--card-border); border-radius: 6px; cursor: pointer;
    background: none; transition: all .15s; font-family: 'Barlow', sans-serif;
  }
  .admin-link:hover { border-color: var(--yellow); color: var(--yellow); }

  /* TOAST */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 18px; border-radius: 10px; font-size: 0.88rem; font-weight: 500;
    animation: slideIn .2s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-width: 300px;
  }
  .toast.ok { background: rgba(34,197,94,0.15); border: 1px solid var(--green); color: #86efac; }
  .toast.err { background: rgba(239,68,68,0.15); border: 1px solid var(--red); color: #fca5a5; }

  /* LOADER */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(34,197,94,0.3); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px; color: var(--muted); }
  .empty p { margin-top: 8px; font-size: 0.88rem; }

  /* SECTION HEADER */
  .sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .divider-line { height: 1px; background: var(--card-border); margin: 16px 0; }

  /* LOGIN */
  .login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 300px; text-align: center; gap: 20px;
  }
  .login-screen h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; }
  .login-screen p { color: var(--muted2); font-size: 0.9rem; }

  /* ATTRIBUTE TABLE */
  .attr-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 10px; }
  @media(max-width:500px) { .attr-grid { grid-template-columns: 1fr 1fr; } }
  .attr-cell {
    background: var(--bg3); border-radius: 8px; padding: 8px 10px; text-align: center;
    border: 1px solid var(--card-border);
  }
  .attr-cell .val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--green); }
  .attr-cell .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; margin-top: 1px; }

  /* OPINION PLAYER GRID */
  .opinion-row { padding: 10px 0; border-bottom: 1px solid var(--card-border); }
  .opinion-row:last-child { border: none; }
  .opinion-row-name { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }

  /* SCORE INPUT */
  .score-input-row { display: flex; align-items: center; gap: 12px; justify-content: center; }
  .score-big-input {
    width: 70px; font-family: 'Barlow Condensed', sans-serif; font-size: 2.5rem; font-weight: 900;
    text-align: center; background: var(--bg3); border: 2px solid var(--card-border);
    border-radius: 12px; color: var(--text); padding: 8px; outline: none;
  }
  .score-big-input:focus { border-color: var(--green); }

  /* TREND ARROWS */
  .trend-up   { color: var(--green); font-size: 0.7rem; }
  .trend-down { color: var(--red); font-size: 0.7rem; }
  .trend-flat { color: var(--muted); font-size: 0.7rem; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0 } to { transform:translateY(0); opacity:1 } }
  @keyframes slideIn { from { transform: translateX(20px); opacity:0 } to { transform:translateX(0); opacity:1 } }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* ADMIN PANEL */
  .admin-bar {
    background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2);
    border-radius: 10px; padding: 10px 16px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .admin-bar span { color: var(--yellow); font-size: 0.85rem; font-weight: 600; }

  /* CHECKBOX */
  .check-row { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
  input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div>
        <h1>FÚTBOL<span>5</span></h1>
        <p>Armador de Equipos</p>
      </div>
    </div>
    <div class="session-bar" id="headerRight"></div>
  </header>

  <!-- TABS -->
  <nav class="tabs" id="mainTabs">
    <button class="active" onclick="setTab('jugar')">⚽ Jugar</button>
    <button onclick="setTab('historial')">📋 Historial</button>
    <button onclick="setTab('stats')">📊 Stats</button>
    <button onclick="setTab('admin')">🔧 Admin</button>
  </nav>

  <!-- CONTENT -->
  <div id="content"></div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toasts"></div>

<script>
// =========================================================
//  CONFIG
// =========================================================
const API = (() => {
  // Si el frontend está hosteado en el mismo origen que el backend, usar relativo.
  // Podés cambiar esto a la URL de tu backend en Railway/Render:
  const stored = localStorage.getItem('apiUrl');
  if (stored) return stored;
  // default: mismo origen (cuando sirve FastAPI el HTML)
  return window.location.origin;
})();

const ADMIN_PIN = localStorage.getItem('adminPin') || '1234';

// =========================================================
//  STATE
// =========================================================
let state = {
  players: [],
  trends: {},
  me: JSON.parse(localStorage.getItem('me') || 'null'),
  tab: 'jugar',
  adminOk: localStorage.getItem('adminOk') === '1',
};

// =========================================================
//  UTILS
// =========================================================
async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!r.ok) {
    const msg = await r.text();
    throw new Error(msg);
  }
  return r.json();
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c === null || c === undefined) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function ovr(p) { return p.overall_expected?.toFixed(1) || '—'; }

function trendBadge(pid) {
  const t = state.trends[pid];
  if (!t) return '';
  const map = { up: '▲ Alza', down: '▼ Baja', flat: '— Parejo' };
  const cls = { up: 'badge-up', down: 'badge-down', flat: 'badge-flat' };
  return `<span class="badge ${cls[t.trend]}">${map[t.trend]}</span>`;
}

function playerLabel(p) {
  return p.name + (p.is_goalkeeper ? ' 🥅' : '');
}

function nameById(id) {
  const p = state.players.find(x => x.id === id);
  return p ? playerLabel(p) : `#${id}`;
}

// =========================================================
//  DATA LOADING
// =========================================================
async function loadAll() {
  try {
    const [players, trends] = await Promise.all([
      api('/players'),
      api('/players/trends?lookback=3').catch(() => []),
    ]);
    state.players = players;
    state.trends = Object.fromEntries(trends.map(t => [t.player_id, t]));
  } catch(e) {
    toast('Error conectando con el servidor. Verificá la URL.', 'err');
  }
}

// =========================================================
//  HEADER
// =========================================================
function renderHeader() {
  const el = document.getElementById('headerRight');
  el.innerHTML = '';
  if (state.me) {
    const p = state.players.find(x => x.id === state.me.player_id);
    el.innerHTML = `
      <div class="session-pill">
        <div class="dot"></div>
        <span>${state.me.name}${p ? ' · ' + p.name : ''}</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    `;
  } else {
    el.innerHTML = `<span style="color:var(--muted);font-size:.85rem">Sin sesión</span>`;
  }
}

// =========================================================
//  TABS
// =========================================================
function setTab(tab) {
  state.tab = tab;
  document.querySelectorAll('nav.tabs button').forEach((b, i) => {
    const tabs = ['jugar','historial','stats','admin'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  renderContent();
}

function renderContent() {
  const el = document.getElementById('content');
  el.innerHTML = '';
  renderHeader();
  if (state.tab === 'jugar') renderJugar(el);
  else if (state.tab === 'historial') renderHistorial(el);
  else if (state.tab === 'stats') renderStats(el);
  else if (state.tab === 'admin') renderAdmin(el);
}

// =========================================================
//  TAB: JUGAR
// =========================================================
function renderJugar(root) {
  if (!state.me) {
    renderLogin(root);
    return;
  }

  const grid = h('div', { class: 'grid2' });
  const left = h('div');
  const right = h('div');
  grid.appendChild(left);
  grid.appendChild(right);
  root.appendChild(grid);

  renderSelfOpinion(left);
  renderSynergy(left);
  renderOthersOpinion(left);
  renderPendingMatches(right);
  renderTeamGenerator(right);
}

// ---- LOGIN ----
function renderLogin(root) {
  const wrap = h('div', { class: 'card' },
    h('div', { class: 'login-screen' },
      h('h2', {}, '¿Quién sos?'),
      h('p', {}, 'Elegí tu jugador para cargar opiniones y sinergias.'),
      (() => {

// ---- SYNERGY ----
function renderSynergy(root) {
  const myPlayer = state.players.find(p => p.id === state.me?.player_id);
  if (!myPlayer) return;

  const others = state.players.filter(p => p.id !== myPlayer.id);
  let prefs = {};

  const card = h('div', { class: 'card' });
  card.appendChild(h('div', { class:'card-title' }, '🤝 Mis sinergias'));

  const loadPrefs = async () => {
    const all = await api('/preferences');
    prefs = Object.fromEntries(all.filter(x => x.src_id === myPlayer.id).map(x => [x.dst_id, x.weight]));
    renderRows();
  };

  const rowsWrap = h('div', {});
  card.appendChild(rowsWrap);

  const synLabels = { 2:'😍 Muy buena', 1:'👍 Buena', 0:'😐 Neutral', '-1':'👎 Mala', '-2':'💀 Muy mala' };

  function renderRows() {
    rowsWrap.innerHTML = '';
    others.forEach(o => {
      const w = prefs[o.id] ?? 0;
      const row = h('div', { class:'syn-row' });
      row.appendChild(h('span', { style:'font-weight:600;font-size:.9rem' }, o.name));
      const sel = h('div', { class:'syn-sel' });
      [-2,-1,0,1,2].forEach(v => {
        const icons = { 2:'💚', 1:'👍', 0:'–', '-1':'👎', '-2':'💔' };
        const btn = h('button', { class:`syn-btn${prefs[o.id]===v || (v===0 && prefs[o.id]===undefined) ? ' active-'+(v>0?'p':'')+(Math.abs(v)) : ''}`,
          title: synLabels[v], onClick: () => {
          prefs[o.id] = v;
          renderRows();
        }}, icons[v]);
        sel.appendChild(btn);
      });
      row.appendChild(sel);
      rowsWrap.appendChild(row);
    });
  }

  const saveBtn = h('button', { class:'btn btn-green', style:'margin-top:12px', onClick: async () => {
    try {
      for (const o of others) {
        await api('/preferences', { method:'POST', body: JSON.stringify({ src_id: myPlayer.id, dst_id: o.id, weight: prefs[o.id] ?? 0 })});
      }
      toast('Sinergias guardadas ✓');
    } catch(e) { toast('Error: '+e.message,'err'); }
  }}, 'Guardar sinergias');
  card.appendChild(saveBtn);
  root.appendChild(card);
  loadPrefs();
}

            const p = state.players.find(x=>x.id===id);

            const row = h('div', { class:'team-player' }, h('span',{},playerLabel(p)));

// ---- RESULT MODAL ----
function openResultModal(match, onDone) {
  const overlay = h('div', { class:'overlay', onClick: e => { if(e.target===overlay) overlay.remove(); } });
  const modal = h('div', { class:'modal' });
  modal.appendChild(h('div', { class:'modal-title' },
    h('span',{},'Cargar resultado'),
    h('button',{class:'close-btn',onClick:()=>overlay.remove()},'×')
  ));

  // Score inputs
  let scoreA = 0, scoreB = 0, winner = 'A';
  const inA = h('input',{type:'number',min:0,max:99,class:'score-big-input',value:0});
  const inB = h('input',{type:'number',min:0,max:99,class:'score-big-input',value:0});
  inA.oninput = () => { scoreA=parseInt(inA.value)||0; autoWinner(); };
  inB.oninput = () => { scoreB=parseInt(inB.value)||0; autoWinner(); };

  const winnerSel = h('select', {style:'margin-top:12px'},
    h('option',{value:'A'},'Ganó Equipo A'),
    h('option',{value:'B'},'Ganó Equipo B'),
    h('option',{value:'D'},'Empate')
  );
  winnerSel.onchange = () => { winner = winnerSel.value; renderRankWrap(); };

  const autoWinner = () => {
    if (scoreA > scoreB) { winner='A'; winnerSel.value='A'; }
    else if (scoreB > scoreA) { winner='B'; winnerSel.value='B'; }
    else { winner='D'; winnerSel.value='D'; }
    renderRankWrap();
  };

  modal.appendChild(h('div', { class:'field' },
    h('label',{style:'text-align:center;display:block;margin-bottom:8px'},'Marcador'),
    h('div', { class:'score-input-row' },
      h('div',{style:'text-align:center'},h('div',{style:'font-size:.75rem;color:var(--muted);margin-bottom:4px'},'Equipo A'),inA),
      h('div',{style:'font-family:"Barlow Condensed",sans-serif;font-size:1.5rem;font-weight:900;color:var(--muted)'},':'),
      h('div',{style:'text-align:center'},h('div',{style:'font-size:.75rem;color:var(--muted);margin-bottom:4px'},'Equipo B'),inB)
    )
  ));
  modal.appendChild(h('div',{class:'field'},winnerSel));

  // Rankings
  const rankWinnersIds = [];
  const rankLosersIds = [];
  const rankWrap = h('div',{});
  modal.appendChild(rankWrap);

  function renderRankWrap() {
    rankWrap.innerHTML = '';
    const winTeam = winner==='A' ? match.team_a : (winner==='B' ? match.team_b : [...match.team_a,...match.team_b]);
    const loseTeam = winner==='D' ? [] : (winner==='A' ? match.team_b : match.team_a);

    const mkRankSel = (label, ids, arr) => {
      const sec = h('div', { style:'margin-top:12px' });
      sec.appendChild(h('label',{},label+' (top 3, en orden)'));
      ids.slice(0,5).forEach((id,i) => {
        const p = state.players.find(x=>x.id===id);
        if(!p) return;
        const sel = h('select', { style:'margin-top:4px' },
          h('option',{value:''},'— no rankear —'),
          ...ids.map((_,j)=>h('option',{value:j+1},`${j+1}° lugar`))
        );
        sel.onchange = () => { arr[id] = parseInt(sel.value)||null; };
        const row = h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:4px'},
          h('span',{style:'flex:1;font-size:.9rem'},playerLabel(p)),sel);
        sec.appendChild(row);
      });
      return sec;
    };

    if (winner !== 'D') {
      rankWrap.appendChild(mkRankSel('🏆 Ranking ganadores', winTeam, rankWinnersIds));
      rankWrap.appendChild(mkRankSel('👟 Ranking perdedores', loseTeam, rankLosersIds));
    }
  }
  renderRankWrap();

  const saveBtn = h('button', { class:'btn btn-green', style:'margin-top:16px;width:100%', onClick: async () => {
    const rankW = Object.entries(rankWinnersIds)
      .filter(([,v])=>v).sort((a,b)=>a[1]-b[1]).map(([k])=>parseInt(k));
    const rankL = Object.entries(rankLosersIds)
      .filter(([,v])=>v).sort((a,b)=>a[1]-b[1]).map(([k])=>parseInt(k));
    try {
      await api(`/matches/${match.id}/result`, { method:'PUT', body: JSON.stringify({
        score_a: parseInt(inA.value)||0, score_b: parseInt(inB.value)||0,
        winner_team: winner,
        rank_winners: rankW, rank_losers: rankL,
      })});
      toast('Resultado cargado ✓');
      overlay.remove();
      await loadAll();
      onDone?.();
    } catch(e) { toast('Error: '+e.message,'err'); }
  }}, '✓ Guardar resultado');
  modal.appendChild(saveBtn);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

// ---- TEAM GENERATOR ----
function renderTeamGenerator(root) {
  const card = h('div', { class:'card' });
  card.appendChild(h('div', { class:'card-title' }, '⚙️ Generador de equipos'));

  const selected = new Set();
  const resultWrap = h('div', {});

  const listWrap = h('div', { style:'max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:12px' });

  function renderList() {
    listWrap.innerHTML = '';
    state.players.forEach(p => {
      const chip = h('div', { class:`player-chip${selected.has(p.id)?' selected':''}${p.is_goalkeeper?' gk':''}` });
      const left2 = h('div', { style:'display:flex;align-items:center;gap:8px' });
      const cb = h('input', { type:'checkbox' });
      cb.checked = selected.has(p.id);
      cb.onchange = () => { if(cb.checked) selected.add(p.id); else selected.delete(p.id); renderList(); };
      left2.appendChild(cb);
      left2.appendChild(h('span', { class:'player-name' }, p.name));
      if (p.is_goalkeeper) left2.appendChild(h('span', { class:'badge badge-gk' }, 'GK'));
      const t = state.trends[p.id];
      if (t) {
        const tc = { up:'badge-up', down:'badge-down', flat:'badge-flat' };
        const tl = { up:'▲', down:'▼', flat:'—' };
        left2.appendChild(h('span', { class:`badge ${tc[t.trend]}` }, tl[t.trend]));
      }
      chip.appendChild(left2);
      chip.appendChild(h('span', { class:'player-ovr' }, ovr(p)));
      chip.onclick = (e) => { if (e.target === cb || e.target.type === 'checkbox') return; cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); };
      listWrap.appendChild(chip);
    });
    counter.textContent = `${selected.size}/10 seleccionados`;
    genBtn.disabled = selected.size !== 10;
  }

  const counter = h('div', { style:'font-size:.82rem;color:var(--muted);margin-bottom:8px' }, '0/10 seleccionados');
  card.appendChild(counter);
  card.appendChild(listWrap);
  renderList();

  const genBtn = h('button', { class:'btn btn-green', disabled: true, onClick: async () => {
    genBtn.disabled = true;
    genBtn.innerHTML = '<span class="spinner"></span> Generando...';
    try {
      const res = await api('/generate_teams', { method:'POST', body: JSON.stringify({ player_ids: [...selected], lambda_syn: 10 })});
      renderResult(res);
    } catch(e) { toast('Error: '+e.message,'err'); }
    genBtn.disabled = selected.size !== 10;
    genBtn.textContent = 'Generar equipos';
  }}, 'Generar equipos');
  card.appendChild(genBtn);
  card.appendChild(resultWrap);

  let lastResult = null;
  function renderResult(res) {
    lastResult = res;
    resultWrap.innerHTML = '';

    const mkTeam = (ids, cls, label) => {
      const box = h('div', { class:'team-box' });
      box.appendChild(h('div', { class:`team-header ${cls}` }, label,
        h('span',{style:'font-size:.8rem;opacity:.7'},'OVR: '+(ids.reduce((s,id)=>{const p=state.players.find(x=>x.id===id);return s+(p?p.overall_expected:0);},0)/ids.length).toFixed(1))
      ));
      const list = h('div', { class:'team-list' });
      ids.forEach(id => {
        const p = state.players.find(x=>x.id===id);
        if (!p) return;
        const row = h('div', { class:'team-player' });
        row.appendChild(h('span', {}, playerLabel(p)));
        const t = state.trends[id];
        if (t && t.trend !== 'flat') {
          row.appendChild(h('span',{style:`color:${t.trend==='up'?'var(--green)':'var(--red)'};font-size:.7rem;margin-left:auto`},t.trend==='up'?'▲':'▼'));
        }
        list.appendChild(row);
      });
      box.appendChild(list);
      return box;
    };

    const teamsGrid = h('div', { style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px' });
    teamsGrid.appendChild(mkTeam(res.team_a, 'a', 'Equipo A'));
    teamsGrid.appendChild(mkTeam(res.team_b, 'b', 'Equipo B'));
    resultWrap.appendChild(teamsGrid);

    const diff = res.score_diff.toFixed(1);
    resultWrap.appendChild(h('div', { style:'text-align:center;color:var(--muted);font-size:.8rem;margin:8px 0' },
      `Diferencia de nivel: ${diff} · Sinergia total: ${res.syn_sum.toFixed(1)}`
    ));

    if (state.adminOk) {
      const saveBtn = h('button', { class:'btn btn-green btn-sm', style:'margin-top:4px', onClick: async () => {
        try {
          await api('/matches', { method:'POST', body: JSON.stringify({ team_a: res.team_a, team_b: res.team_b })});
          toast('Partido agendado para el próximo jueves ✓');
          renderContent();
        } catch(e) { toast('Error: '+e.message,'err'); }
      }}, '📅 Agendar partido');
      resultWrap.appendChild(saveBtn);
    }
  }

  root.appendChild(card);
}

          const dateStr = m.played_at ? new Date(m.played_at).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}) : '—';
          mc.appendChild(h('div',{style:'font-size:.78rem;color:var(--muted);margin-bottom:10px'},dateStr));

          const scoreRow = h('div', { class:'match-score', style:'margin-bottom:12px' });
          const winA = m.winner_team==='A', winB=m.winner_team==='B', draw=m.winner_team==='D';
          scoreRow.appendChild(h('span',{style:`font-size:1.1rem;font-weight:700;color:${winA?'#93c5fd':'var(--muted)'}; flex:1;text-align:right`},'Equipo A'));
          scoreRow.appendChild(h('span',{style:`font-family:"Barlow Condensed",sans-serif;font-size:2.5rem;font-weight:900;color:${winA?'var(--blue)':winB?'var(--red)':'var(--yellow)'};padding:0 10px`},`${m.score_a}–${m.score_b}`));
          scoreRow.appendChild(h('span',{style:`font-size:1.1rem;font-weight:700;color:${winB?'#fca5a5':'var(--muted)'}; flex:1;text-align:left`},'Equipo B'));
          mc.appendChild(scoreRow);

          if (draw) mc.appendChild(h('div',{style:'text-align:center;font-size:.85rem;color:var(--yellow);margin-bottom:8px'},'🤝 Empate'));
          else mc.appendChild(h('div',{style:`text-align:center;font-size:.85rem;color:${winA?'#93c5fd':'#fca5a5'};margin-bottom:8px`},`🏆 Ganó ${winA?'Equipo A':'Equipo B'}`));
        } else {
          const dateStr = m.scheduled_at ? new Date(m.scheduled_at).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}) : 'Pendiente';
          mc.appendChild(h('div',{style:'font-size:.85rem;color:var(--muted2);margin-bottom:10px'},`📅 ${dateStr}`));
        }

        const teamsGrid = h('div', { style:'display:grid;grid-template-columns:1fr 1fr;gap:8px' });
        const mkT = (ids, cls) => {
          const box = h('div', { class:'team-box' });
          box.appendChild(h('div', { class:`team-header ${cls}` }, cls==='a'?'Equipo A':'Equipo B'));
          const list = h('div', { class:'team-list' });
          ids.forEach(id => {
            const p = state.players.find(x=>x.id===id);
            const isW = m.rank_winners && m.rank_winners.includes(id);
            const pos = m.rank_winners ? m.rank_winners.indexOf(id) : -1;
            const row = h('div', { class:'team-player' },
              pos >= 0 ? h('span',{class:'rank-num'},`${pos+1}°`) : h('span',{class:'rank-num'}),
              h('span',{},p ? playerLabel(p) : `#${id}`)
            );
            if (isW) row.style.color = 'var(--yellow)';
            list.appendChild(row);
          });
          box.appendChild(list);
          return box;
        };
        teamsGrid.appendChild(mkT(m.team_a,'a'));
        teamsGrid.appendChild(mkT(m.team_b,'b'));
        mc.appendChild(teamsGrid);

        if (state.adminOk) {
          const actions = h('div',{style:'display:flex;gap:6px;margin-top:10px'});
          if (!m.is_recorded) {
            actions.appendChild(h('button',{class:'btn btn-green btn-sm',onClick:()=>openResultModal(m,()=>{load();})}, '⚽ Cargar resultado'));
          }
          actions.appendChild(h('button',{class:'btn btn-red btn-sm',onClick:async()=>{
            if(!confirm(`¿Eliminar partido #${m.id}?`)) return;
            await api(`/matches/${m.id}`,{method:'DELETE'});
            toast('Partido eliminado');
            load();
          }}, '🗑 Borrar'));
          mc.appendChild(actions);
        }

        listWrap.appendChild(mc);
      });
    } catch(e) { toast('Error cargando historial','err'); }
  };
  load();
  root.appendChild(card);
}

// =========================================================
//  TAB: STATS
// =========================================================
async function renderStats(root) {
  const card = h('div', { class:'card' });
  card.appendChild(h('div', { class:'card-title' }, '📊 Estadísticas de jugadores'));

  const wrap = h('div', {});
  card.appendChild(wrap);

  try {
    const [playersWithOp, trends, matches] = await Promise.all([
      api('/players/with_opinions'),
      api('/players/trends?lookback=5'),
      api('/matches?status=played'),
    ]);
    const trendsMap = Object.fromEntries(trends.map(t => [t.player_id, t]));

    // Win rates
    const wins = {}, gamesPlayed = {};
    matches.forEach(m => {
      [...m.team_a, ...m.team_b].forEach(id => { gamesPlayed[id] = (gamesPlayed[id]||0)+1; });
      if (m.winner_team === 'A') m.team_a.forEach(id => { wins[id]=(wins[id]||0)+1; });
      else if (m.winner_team === 'B') m.team_b.forEach(id => { wins[id]=(wins[id]||0)+1; });
    });

    // Sort by overall
    const sorted = [...playersWithOp].sort((a,b) => b.overall_combined - a.overall_combined);
    const attrs = ['shot','passing','defense','vision','stamina','speed'];
    const attrLabels = { shot:'Disparo', passing:'Pase', defense:'Defensa', vision:'Visión', stamina:'Físico', speed:'Velocidad' };

    sorted.forEach((p, idx) => {
      const t = trendsMap[p.id];
      const gp = gamesPlayed[p.id] || 0;
      const w = wins[p.id] || 0;
      const wr = gp > 0 ? Math.round((w/gp)*100) : null;

      const row = h('div', { style:'margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--card-border)' });

      // Player header
      const hdr = h('div', { style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px' });
      const nameRow = h('div', { style:'display:flex;align-items:center;gap:10px' });
      nameRow.appendChild(h('div',{style:`width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:.9rem;color:var(--muted)`},`${idx+1}`));
      nameRow.appendChild(h('span',{style:'font-weight:700;font-size:1rem'},p.name + (p.is_goalkeeper?' 🥅':'')));
      if (t) {
        const tc={up:'badge-up',down:'badge-down',flat:'badge-flat'};
        const tl={up:'▲ Alza',down:'▼ Baja',flat:'— Parejo'};
        nameRow.appendChild(h('span',{class:`badge ${tc[t.trend]}`},tl[t.trend]));
      }
      hdr.appendChild(nameRow);

      const metaRow = h('div', { style:'display:flex;gap:12px;align-items:center' });
      metaRow.appendChild(h('div',{style:'text-align:center'},
        h('div',{style:'font-family:"Barlow Condensed",sans-serif;font-size:1.5rem;font-weight:900;color:var(--green)'},p.overall_combined.toFixed(1)),
        h('div',{style:'font-size:.7rem;color:var(--muted)'},'OVR')
      ));
      if (gp > 0) {
        metaRow.appendChild(h('div',{style:'text-align:center'},
          h('div',{style:'font-family:"Barlow Condensed",sans-serif;font-size:1.3rem;font-weight:700'},gp),
          h('div',{style:'font-size:.7rem;color:var(--muted)'},'Partidos')
        ));
        if (wr !== null) metaRow.appendChild(h('div',{style:'text-align:center'},
          h('div',{style:`font-family:"Barlow Condensed",sans-serif;font-size:1.3rem;font-weight:700;color:${wr>=50?'var(--green)':'var(--red)'}`},`${wr}%`),
          h('div',{style:'font-size:.7rem;color:var(--muted)'},'Victorias')
        ));
      }
      hdr.appendChild(metaRow);
      row.appendChild(hdr);

      // Attrs
      const attGrid = h('div', { class:'attr-grid' });
      attrs.forEach(a => {
        const v = p.combined[a]?.toFixed(1) || '—';
        const adminV = p.admin[a]?.toFixed(1) || '—';
        const cell = h('div', { class:'attr-cell' },
          h('div',{class:'val'},v),
          h('div',{class:'lbl'},attrLabels[a]),
          (v !== adminV ? h('div',{style:'font-size:.65rem;color:var(--muted)',title:'Valor admin'},`admin: ${adminV}`) : null)
        );
        attGrid.appendChild(cell);
      });
      row.appendChild(attGrid);
      wrap.appendChild(row);
    });

    if (!sorted.length) wrap.appendChild(h('div',{class:'empty'},h('p',{},'No hay jugadores aún')));
  } catch(e) {
    wrap.appendChild(h('div',{class:'empty'},h('p',{},'Error cargando estadísticas: '+e.message)));
  }

  root.appendChild(card);
}

// =========================================================
//  TAB: ADMIN
// =========================================================
function renderAdmin(root) {
  if (!state.adminOk) {
    const card = h('div', { class:'card', style:'max-width:400px;margin:0 auto' });
    card.appendChild(h('div',{class:'card-title'},'🔧 Panel de Admin'));
    card.appendChild(h('p',{style:'color:var(--muted2);font-size:.9rem;margin-bottom:16px'},'Ingresá el PIN para acceder.'));
    const inp = h('input',{type:'password',placeholder:'PIN de admin'});
    card.appendChild(h('div',{class:'field'},inp));

    // URL del backend
    const urlInp = h('input',{type:'text',placeholder:'URL del backend (ej: https://mi-app.up.railway.app)',value:localStorage.getItem('apiUrl')||''});
    card.appendChild(h('div',{class:'field'},h('label',{},'URL del backend'),urlInp));

    const loginBtn = h('button',{class:'btn btn-green',onClick:()=>{
      if (inp.value === (localStorage.getItem('adminPin')||'1234')) {
        state.adminOk = true;
        localStorage.setItem('adminOk','1');
        if (urlInp.value) localStorage.setItem('apiUrl', urlInp.value);
        toast('Acceso de admin ✓');
        renderContent();
      } else {
        toast('PIN incorrecto','err');
      }
    }}, 'Ingresar');
    card.appendChild(loginBtn);
    root.appendChild(card);
    return;
  }

  const adminBar = h('div',{class:'admin-bar'},
    h('span',{},'⚡ Modo administrador'),
    h('button',{class:'btn btn-ghost btn-sm',onClick:()=>{
      state.adminOk=false; localStorage.removeItem('adminOk'); renderContent();
    }},'Salir de admin')
  );
  root.appendChild(adminBar);

  renderPlayerAdmin(root);
}

function renderPlayerAdmin(root) {
  const card = h('div', { class:'card' });
  card.appendChild(h('div',{class:'card-title'},'👥 Gestión de jugadores'));

  const listWrap = h('div',{style:'margin-bottom:16px'});
  card.appendChild(listWrap);

  const attrs = ['shot','passing','defense','vision','stamina','speed'];
  const attrLabels = { shot:'Disparo', passing:'Pase', defense:'Defensa', vision:'Visión', stamina:'Físico', speed:'Vel' };
  let editing = null;

  const loadList = () => {
    listWrap.innerHTML = '';
    if (!state.players.length) {
      listWrap.appendChild(h('div',{class:'empty'},h('p',{},'No hay jugadores')));
      return;
    }
    state.players.forEach(p => {
      const row = h('div',{class:'player-chip',style:'margin-bottom:6px'});
      const left2 = h('div',{style:'display:flex;align-items:center;gap:8px;flex:1'});
      left2.appendChild(h('span',{class:'player-name'},p.name));
      if(p.is_goalkeeper) left2.appendChild(h('span',{class:'badge badge-gk'},'GK'));
      left2.appendChild(h('span',{style:'color:var(--muted);font-size:.8rem'},`OVR: ${ovr(p)}`));
      row.appendChild(left2);
      const btns = h('div',{style:'display:flex;gap:6px'});
      btns.appendChild(h('button',{class:'btn btn-ghost btn-sm',onClick:()=>{ editing=p; renderForm(); toast('Editando: '+p.name); }}, '✏️'));
      btns.appendChild(h('button',{class:'btn btn-red btn-sm',onClick:async()=>{
        if(!confirm(`¿Eliminar a ${p.name}?`)) return;
        try { await api(`/players/${p.id}`,{method:'DELETE'}); await loadAll(); loadList(); toast(`${p.name} eliminado`); }
        catch(e){ toast('Error: '+e.message,'err'); }
      }},'🗑'));
      row.appendChild(btns);
      listWrap.appendChild(row);
    });
  };

  // Form
  const formCard = h('div',{class:'card',style:'background:var(--bg3)'});
  card.appendChild(formCard);

  const renderForm = () => {
    formCard.innerHTML = '';
    const p = editing;
    formCard.appendChild(h('div',{class:'card-title',style:'margin-bottom:12px'},p?`✏️ Editar: ${p.name}`:'➕ Nuevo jugador'));

    const vals = {};
    attrs.forEach(a => { vals[a] = [p?p[`${a}_min`]:4, p?p[`${a}_max`]:6]; });

    const nameInp = h('input',{type:'text',placeholder:'Nombre del jugador',value:p?.name||''});
    formCard.appendChild(h('div',{class:'field'},h('label',{},'Nombre'),nameInp));

    const gkCb = h('input',{type:'checkbox'}); gkCb.checked = p?.is_goalkeeper||false;
    formCard.appendChild(h('div',{class:'field'},h('label',{class:'check-row'},gkCb,'Es arquero')));

    const regInp = h('input',{type:'range',min:0,max:1,step:0.05,value:p?.regularity||0.7});
    const regVal = h('span',{style:'color:var(--green);font-weight:700'},Math.round((p?.regularity||0.7)*100)+'%');
    regInp.oninput = () => { regVal.textContent = Math.round(parseFloat(regInp.value)*100)+'%'; };
    formCard.appendChild(h('div',{class:'field'},
      h('div',{style:'display:flex;justify-content:space-between'},h('label',{},'Regularidad (asistencia)'),regVal),
      h('div',{class:'range-wrap'},regInp)
    ));

    formCard.appendChild(h('div',{style:'font-size:.8rem;color:var(--muted2);margin:10px 0 6px'},'Atributos (rango min–max):'));
    attrs.forEach(a => {
      const lbl = h('div',{style:'display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted2);margin-bottom:3px'},
        h('span',{},attrLabels[a]),
        (() => { const s=h('span',{style:'color:var(--green);font-weight:700'},`${vals[a][0]}–${vals[a][1]}`); return s; })()
      );
      const mn=h('input',{type:'range',min:1,max:10,step:0.5,value:vals[a][0]});
      const mx=h('input',{type:'range',min:1,max:10,step:0.5,value:vals[a][1]});
      const upd=()=>{
        let mnv=parseFloat(mn.value),mxv=parseFloat(mx.value);
        if(mnv>mxv)mxv=mnv;
        vals[a]=[mnv,mxv];
        lbl.querySelector('span:last-child').textContent=`${mnv}–${mxv}`;
      };
      mn.oninput=upd; mx.oninput=upd;
      formCard.appendChild(h('div',{style:'margin-bottom:8px'},lbl,h('div',{class:'range-wrap'},mn,mx)));
    });

    const btnRow = h('div',{style:'display:flex;gap:8px;margin-top:12px;flex-wrap:wrap'});
    const saveBtn = h('button',{class:'btn btn-green',onClick:async()=>{
      const body = {
        name: nameInp.value.trim(), is_goalkeeper: gkCb.checked, regularity: parseFloat(regInp.value),
        ...Object.fromEntries(attrs.flatMap(a=>[[ `${a}_min`,vals[a][0]],[`${a}_max`,vals[a][1]]]))
      };
      if (!body.name) { toast('Ingresá un nombre','err'); return; }
      try {
        if (p) { await api(`/players/${p.id}`,{method:'PUT',body:JSON.stringify(body)}); toast(`${body.name} actualizado ✓`); }
        else { await api('/players',{method:'POST',body:JSON.stringify(body)}); toast(`${body.name} creado ✓`); }
        await loadAll(); loadList();
        editing = null; renderForm();
      } catch(e){ toast('Error: '+e.message,'err'); }
    }},p?'Actualizar':'Crear jugador');
    btnRow.appendChild(saveBtn);
    if (p) btnRow.appendChild(h('button',{class:'btn btn-ghost',onClick:()=>{ editing=null; renderForm(); }},'Cancelar'));
    formCard.appendChild(btnRow);
  };

  renderForm();
  loadList();
  root.appendChild(card);

  // Config API URL
  const configCard = h('div',{class:'card'});
  configCard.appendChild(h('div',{class:'card-title'},'⚙️ Configuración'));
  const urlInp = h('input',{type:'text',placeholder:'URL del backend',value:localStorage.getItem('apiUrl')||window.location.origin});
  configCard.appendChild(h('div',{class:'field'},h('label',{},'URL del backend'),urlInp));

  const pinInp = h('input',{type:'password',placeholder:'Nuevo PIN (default: 1234)',value:''});
  configCard.appendChild(h('div',{class:'field'},h('label',{},'Cambiar PIN admin'),pinInp));

  configCard.appendChild(h('button',{class:'btn btn-ghost btn-sm',onClick:()=>{
    if(urlInp.value) localStorage.setItem('apiUrl', urlInp.value.trim());
    if(pinInp.value) localStorage.setItem('adminPin', pinInp.value);
    toast('Configuración guardada. Recargando...'); setTimeout(()=>location.reload(),800);
  }},'Guardar configuración'));

  root.appendChild(configCard);
}

// =========================================================
//  INIT
// =========================================================
async function init() {
  await loadAll();
  renderContent();
}
init();
</script>
</body>
